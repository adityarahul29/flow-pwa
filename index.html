<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#080808" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Flow" />
  <title>Flow</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080808;
      --bg2: #101010;
      --bg3: #181818;
      --border: #1e1e1e;
      --border2: #282828;
      --text: #efefef;
      --text2: #777;
      --text3: #333;
      --accent: #c8ff00;
      --accent-dim: rgba(200,255,0,0.08);
      --red: #ff4040;
      --green: #00e87a;
      --blue: #4da6ff;
      --user-bubble: #161616;
      --ai-bubble: #0e0e0e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
    }

    /* AUTH */
    #auth {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg);
      z-index: 999;
      gap: 0;
    }

    .auth-wordmark {
      font-family: 'Instrument Serif', serif;
      font-size: 72px;
      color: var(--text);
      letter-spacing: -3px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .auth-sub {
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    .auth-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border2);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 18px;
      padding: 12px 0;
      width: 200px;
      text-align: center;
      letter-spacing: 6px;
      outline: none;
      margin-bottom: 32px;
    }

    .auth-input::placeholder { color: var(--text3); letter-spacing: 3px; font-size: 14px; }
    .auth-input:focus { border-bottom-color: var(--accent); }

    .auth-btn {
      background: none;
      border: 1px solid var(--border2);
      color: var(--text2);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 10px 24px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .auth-btn:hover { border-color: var(--accent); color: var(--accent); }

    .auth-error {
      font-size: 10px;
      color: var(--red);
      letter-spacing: 1px;
      margin-top: 16px;
      display: none;
    }

    /* MAIN LAYOUT */
    #app {
      display: none;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
    }

    .wordmark {
      font-family: 'Instrument Serif', serif;
      font-size: 26px;
      letter-spacing: -1px;
      color: var(--text);
    }

    .wordmark span { color: var(--accent); }

    .header-actions { display: flex; gap: 10px; align-items: center; }

    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      width: 32px; height: 32px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }

    .icon-btn:hover { border-color: var(--border2); color: var(--text); }
    .icon-btn:active { background: var(--bg3); }

    .status-dot {
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* CHAT AREA */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    #chat::-webkit-scrollbar { width: 2px; }
    #chat::-webkit-scrollbar-thumb { background: var(--border2); }

    /* MESSAGES */
    .msg {
      margin-bottom: 20px;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-role {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
      color: var(--text3);
    }

    .msg.user .msg-role { color: var(--accent); opacity: 0.6; }

    .msg-bubble {
      padding: 12px 14px;
      border-radius: 2px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .msg-bubble {
      background: var(--user-bubble);
      border-left: 2px solid var(--accent);
      color: var(--text);
    }

    .msg.ai .msg-bubble {
      background: var(--ai-bubble);
      border-left: 2px solid var(--border2);
      color: var(--text);
    }

    .msg.system .msg-bubble {
      background: transparent;
      border-left: none;
      color: var(--text3);
      font-size: 11px;
      padding: 4px 0;
    }

    /* ACTION CARDS in messages */
    .action-card {
      margin-top: 10px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 11px;
      color: var(--text2);
    }

    .action-card .action-title {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }

    /* TYPING INDICATOR */
    .typing {
      display: flex;
      gap: 4px;
      padding: 12px 14px;
      background: var(--ai-bubble);
      border-left: 2px solid var(--border2);
      border-radius: 2px;
      width: fit-content;
    }

    .typing span {
      width: 4px; height: 4px;
      background: var(--text3);
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }

    /* QUICK PROMPTS */
    #quick-prompts {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
    }

    #quick-prompts::-webkit-scrollbar { display: none; }

    .quick-btn {
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 7px 12px;
      border-radius: 2px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .quick-btn:hover { border-color: var(--accent); color: var(--accent); }
    .quick-btn:active { background: var(--accent-dim); }

    /* INPUT BAR */
    #input-bar {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 4px;
      outline: none;
      resize: none;
      max-height: 120px;
      min-height: 40px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    #msg-input:focus { border-color: var(--border2); }
    #msg-input::placeholder { color: var(--text3); }

    #send-btn {
      background: var(--accent);
      color: #000;
      border: none;
      width: 40px; height: 40px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    #send-btn:disabled { opacity: 0.3; cursor: default; }
    #send-btn:active { opacity: 0.8; }

    /* SIDEBAR / DATA PANEL */
    #panel {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 50;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      display: flex;
      flex-direction: column;
    }

    #panel.open { transform: translateX(0); }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* PANEL TABS */
    .panel-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .ptab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }

    .ptab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* DATA ROWS */
    .data-row {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .data-row-left { flex: 1; min-width: 0; }
    .data-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .data-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .data-val { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--accent); flex-shrink: 0; }

    .badge {
      font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
      padding: 2px 7px; border-radius: 2px;
    }
    .badge.active { background: rgba(0,232,122,0.1); color: var(--green); }
    .badge.invoiced { background: rgba(77,166,255,0.1); color: var(--blue); }
    .badge.done { background: rgba(100,100,100,0.1); color: var(--text3); }
    .badge.pending { background: rgba(200,255,0,0.08); color: var(--accent); }
    .badge.high { color: var(--red); }

    .metrics-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }

    .metric-card {
      background: var(--bg);
      padding: 16px 12px;
      text-align: center;
    }

    .metric-val {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .metric-val.green { color: var(--green); }
    .metric-val.yellow { color: var(--accent); }
    .metric-val.red { color: var(--red); }

    .metric-label {
      font-size: 9px;
      color: var(--text3);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .section-label {
      padding: 12px 20px 6px;
      font-size: 9px;
      color: var(--text3);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .empty { padding: 32px 20px; text-align: center; color: var(--text3); font-size: 11px; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 100px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text);
      font-size: 11px;
      padding: 8px 16px;
      border-radius: 2px;
      opacity: 0;
      transition: all 0.2s;
      z-index: 999;
      white-space: nowrap;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.ok { color: var(--green); }
    .toast.err { color: var(--red); }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="auth-wordmark">Flow</div>
  <div class="auth-sub">AlmostCult Labs</div>
  <input class="auth-input" id="pin" type="password" placeholder="password" autocomplete="off" />
  <button class="auth-btn" onclick="doAuth()">Enter</button>
  <div class="auth-error" id="auth-err">wrong password</div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="wordmark">Flow<span>.</span></div>
    <div class="header-actions">
      <div class="status-dot" title="Connected"></div>
      <button class="icon-btn" onclick="clearChat()" title="Clear chat">↺</button>
      <button class="icon-btn" onclick="openPanel()" title="View data">≡</button>
    </div>
  </header>

  <div id="chat"></div>

  <div id="quick-prompts">
    <button class="quick-btn" onclick="quickSend('What's my total outstanding amount?')">💰 Outstanding</button>
    <button class="quick-btn" onclick="quickSend('What are my tasks due today or tomorrow?')">📋 Due soon</button>
    <button class="quick-btn" onclick="quickSend('Give me a full status update on all active projects')">📊 Status update</button>
    <button class="quick-btn" onclick="quickSend('Which client owes me the most money?')">🔍 Who owes me</button>
    <button class="quick-btn" onclick="quickSend('What should I focus on today?')">🎯 Today's focus</button>
    <button class="quick-btn" onclick="quickSend('Summarize this week for me')">📅 Week summary</button>
  </div>

  <div id="input-bar">
    <textarea id="msg-input" placeholder="Ask anything or give a command..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMsg()">↑</button>
  </div>
</div>

<!-- DATA PANEL -->
<div id="panel">
  <div class="panel-header">
    <div class="panel-title">Your Data</div>
    <button class="icon-btn" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-tabs">
    <div class="ptab active" onclick="switchPTab('projects')">Projects</div>
    <div class="ptab" onclick="switchPTab('tasks')">Tasks</div>
    <div class="ptab" onclick="switchPTab('finances')">Finances</div>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const PASSWORD = "almostcult";
const CLAUDE_MODEL = "claude-sonnet-4-20250514";
const FIREBASE_KEY = "AIzaSyDCbo5QmuGYoqfB3lWSbk4DRJiYqBQFU7k";
const FIRESTORE = "https://firestore.googleapis.com/v1/projects/flow-2dfcf/databases/(default)/documents";

// ── STATE ────────────────────────────────────────────────
let chatHistory = [];
let fsData = { projects: [], tasks: [], finances: [] };
let isThinking = false;
let currentPTab = 'projects';

// ── AUTH ─────────────────────────────────────────────────
function doAuth() {
  if (document.getElementById('pin').value === PASSWORD) {
    sessionStorage.setItem('flow-ok', '1');
    document.getElementById('auth').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    boot();
  } else {
    document.getElementById('auth-err').style.display = 'block';
    document.getElementById('pin').value = '';
  }
}

document.getElementById('pin').addEventListener('keydown', e => { if (e.key === 'Enter') doAuth(); });
if (sessionStorage.getItem('flow-ok')) {
  document.getElementById('auth').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  boot();
}

// ── BOOT ─────────────────────────────────────────────────
async function boot() {
  autoResize();
  await loadFirestore();
  greet();
}

function greet() {
  const hour = new Date().getHours();
  const greetings = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  const active = fsData.projects.filter(p => p.status === 'active').length;
  const today = new Date().toISOString().split('T')[0];
  const dueToday = fsData.tasks.filter(t => t.due === today && t.status !== 'done').length;
  const outstanding = fsData.projects.reduce((s, p) => s + (parseFloat(p.pending) || 0), 0);

  addMsg('ai', `${greetings}, Aditya.\n\n` +
    `Here's where things stand:\n` +
    `— ${active} active project${active !== 1 ? 's' : ''}\n` +
    `— ${dueToday} task${dueToday !== 1 ? 's' : ''} due today\n` +
    `— ₹${outstanding.toLocaleString('en-IN')} outstanding\n\n` +
    `What do you want to work on?`);
}

// ── FIRESTORE ─────────────────────────────────────────────
async function loadFirestore() {
  try {
    const [p, t, f] = await Promise.all([
      fsGet('projects'), fsGet('tasks'), fsGet('finances')
    ]);
    fsData = { projects: p, tasks: t, finances: f };
  } catch(e) {
    addMsg('system', '⚠ Could not load data from Firestore.');
  }
}

async function fsGet(col) {
  const res = await fetch(`${FIRESTORE}/${col}?key=${FIREBASE_KEY}&pageSize=100`);
  const data = await res.json();
  if (!data.documents) return [];
  return data.documents.map(doc => {
    const id = doc.name.split('/').pop();
    const fields = {};
    for (const [k, v] of Object.entries(doc.fields || {})) {
      fields[k] = v.stringValue ?? v.integerValue ?? v.doubleValue ?? v.booleanValue ?? '';
    }
    return { id, ...fields };
  });
}

async function fsWrite(col, id, fields) {
  const fsFields = {};
  for (const [k, v] of Object.entries(fields)) {
    fsFields[k] = { stringValue: String(v) };
  }
  const mask = Object.keys(fields).map(k => `updateMask.fieldPaths=${k}`).join('&');
  const url = id
    ? `${FIRESTORE}/${col}/${id}?${mask}&key=${FIREBASE_KEY}`
    : `${FIRESTORE}/${col}?documentId=doc_${Date.now()}&key=${FIREBASE_KEY}`;
  const res = await fetch(url, {
    method: id ? 'PATCH' : 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields: fsFields })
  });
  return res.json();
}

async function fsDelete(col, id) {
  await fetch(`${FIRESTORE}/${col}/${id}?key=${FIREBASE_KEY}`, { method: 'DELETE' });
}

// ── CLAUDE ────────────────────────────────────────────────
function buildSystemPrompt() {
  const today = new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  return `You are Flow, a personal AI agent for Aditya Rahul — a freelance filmmaker and cinematographer operating under AlmostCult Labs based in Delhi, India.

Today is ${today}.

Your job is to help Aditya manage his work: projects, tasks, clients, and finances. You have full read and write access to his Firestore database.

## Current Data

### PROJECTS
${JSON.stringify(fsData.projects, null, 2)}

### TASKS
${JSON.stringify(fsData.tasks, null, 2)}

### FINANCES
${JSON.stringify(fsData.finances, null, 2)}

## Your Capabilities
You can:
- Answer questions about his data (outstanding amounts, overdue tasks, project status)
- Analyze and give insights (who owes the most, what's urgent, weekly summaries)
- Perform actions by including a JSON command block in your response

## Actions
When you need to create, update, or delete data, include a JSON block at the END of your response in this exact format:

<action>
{"op":"update","collection":"projects","id":"DOC_ID","fields":{"status":"invoice sent"}}
</action>

<action>
{"op":"create","collection":"tasks","fields":{"title":"Edit Kinuav reel","priority":"high","due":"2026-04-25","status":"pending","project":"Kinuav"}}
</action>

<action>
{"op":"delete","collection":"tasks","id":"DOC_ID"}
</action>

You can include multiple <action> blocks. Always explain what you're doing in plain language first, then include the action blocks.

## Personality
- Concise, direct, no fluff
- Talk like a sharp colleague, not a chatbot
- Use Indian currency format (₹) 
- Dates in DD MMM format
- When amounts are large, show in lakhs if appropriate
- Don't repeat data back verbatim — synthesize and give insight`;
}

async function sendToClaude(userMsg) {
  chatHistory.push({ role: 'user', content: userMsg });

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: CLAUDE_MODEL,
      max_tokens: 1000,
      system: buildSystemPrompt(),
      messages: chatHistory
    })
  });

  const data = await res.json();
  const rawText = data.content?.[0]?.text || 'Something went wrong.';

  // Parse and execute actions
  const actionMatches = [...rawText.matchAll(/<action>([\s\S]*?)<\/action>/g)];
  const cleanText = rawText.replace(/<action>[\s\S]*?<\/action>/g, '').trim();

  chatHistory.push({ role: 'assistant', content: rawText });

  // Execute actions
  let actionsExecuted = [];
  for (const match of actionMatches) {
    try {
      const cmd = JSON.parse(match[1].trim());
      if (cmd.op === 'update') {
        await fsWrite(cmd.collection, cmd.id, cmd.fields);
        actionsExecuted.push(`Updated ${cmd.collection}/${cmd.id}`);
      } else if (cmd.op === 'create') {
        await fsWrite(cmd.collection, null, cmd.fields);
        actionsExecuted.push(`Created in ${cmd.collection}`);
      } else if (cmd.op === 'delete') {
        await fsDelete(cmd.collection, cmd.id);
        actionsExecuted.push(`Deleted ${cmd.collection}/${cmd.id}`);
      }
    } catch(e) {
      actionsExecuted.push(`Action failed: ${e.message}`);
    }
  }

  // Reload data if actions were taken
  if (actionsExecuted.length > 0) {
    await loadFirestore();
    renderPanelContent();
  }

  return { text: cleanText, actions: actionsExecuted };
}

// ── CHAT UI ───────────────────────────────────────────────
function addMsg(role, text, actions = []) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const roleLabel = role === 'user' ? 'You' : role === 'ai' ? 'Flow' : '';
  div.innerHTML = `
    ${roleLabel ? `<div class="msg-role">${roleLabel}</div>` : ''}
    <div class="msg-bubble">${escHtml(text)}</div>
    ${actions.length ? `<div class="action-card"><div class="action-title">Actions taken</div>${actions.map(a => `<div>→ ${escHtml(a)}</div>`).join('')}</div>` : ''}
  `;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="msg-role">Flow</div><div class="typing"><span></span><span></span><span></span></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  document.getElementById('typing-indicator')?.remove();
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function sendMsg() {
  if (isThinking) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  isThinking = true;
  document.getElementById('send-btn').disabled = true;

  addMsg('user', text);
  showTyping();

  try {
    const { text: reply, actions } = await sendToClaude(text);
    hideTyping();
    addMsg('ai', reply, actions);
    if (actions.length) toast('Data updated', 'ok');
  } catch(e) {
    hideTyping();
    addMsg('system', '⚠ Failed to reach Claude. Check your connection.');
  }

  isThinking = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

function quickSend(text) {
  document.getElementById('msg-input').value = text;
  sendMsg();
}

function clearChat() {
  chatHistory = [];
  document.getElementById('chat').innerHTML = '';
  greet();
}

// Auto resize textarea
function autoResize() {
  const input = document.getElementById('msg-input');
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMsg();
    }
  });
}

// ── PANEL ─────────────────────────────────────────────────
function openPanel() {
  document.getElementById('panel').classList.add('open');
  renderPanelContent();
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
}

function switchPTab(tab) {
  currentPTab = tab;
  document.querySelectorAll('.ptab').forEach((el, i) => {
    el.classList.toggle('active', ['projects','tasks','finances'][i] === tab);
  });
  renderPanelContent();
}

function renderPanelContent() {
  const body = document.getElementById('panel-body');
  if (currentPTab === 'projects') {
    const outstanding = fsData.projects.reduce((s,p) => s + (parseFloat(p.pending)||0), 0);
    const active = fsData.projects.filter(p => p.status === 'active').length;
    body.innerHTML = `
      <div class="metrics-row">
        <div class="metric-card"><div class="metric-val yellow">${active}</div><div class="metric-label">Active</div></div>
        <div class="metric-card"><div class="metric-val yellow">₹${(outstanding/1000).toFixed(0)}k</div><div class="metric-label">Pending</div></div>
        <div class="metric-card"><div class="metric-val">${fsData.projects.length}</div><div class="metric-label">Total</div></div>
      </div>
      ${fsData.projects.map(p => `
        <div class="data-row">
          <div class="data-row-left">
            <div class="data-name">${p.client || '—'}</div>
            <div class="data-sub">${p.project || ''}</div>
          </div>
          <div style="text-align:right">
            <div class="data-val">₹${parseFloat(p.pending||0).toLocaleString('en-IN')}</div>
            <span class="badge ${p.status === 'active' ? 'active' : p.status === 'invoice sent' ? 'invoiced' : p.status === 'done' ? 'done' : 'pending'}">${p.status||'—'}</span>
          </div>
        </div>`).join('') || '<div class="empty">No projects</div>'}`;

  } else if (currentPTab === 'tasks') {
    const today = new Date().toISOString().split('T')[0];
    const pending = fsData.tasks.filter(t => t.status !== 'done');
    const done = fsData.tasks.filter(t => t.status === 'done');
    body.innerHTML = `
      <div class="section-label">Pending (${pending.length})</div>
      ${pending.map(t => {
        const overdue = t.due && t.due < today;
        return `<div class="data-row">
          <div class="data-row-left">
            <div class="data-name">${t.title||'—'}</div>
            <div class="data-sub" style="${overdue?'color:var(--red)':''}">${t.due||''} ${t.project ? '· '+t.project : ''}</div>
          </div>
          ${t.priority==='high' ? '<span class="badge high">high</span>' : ''}
        </div>`;
      }).join('') || '<div class="empty">No pending tasks</div>'}
      <div class="section-label">Done (${done.length})</div>
      ${done.map(t => `<div class="data-row" style="opacity:0.4">
        <div class="data-name" style="text-decoration:line-through">${t.title||'—'}</div>
      </div>`).join('')}`;

  } else if (currentPTab === 'finances') {
    const received = fsData.finances.filter(f=>f.type==='received').reduce((s,f)=>s+(parseFloat(f.amount)||0),0);
    const pending = fsData.finances.filter(f=>f.type==='pending').reduce((s,f)=>s+(parseFloat(f.amount)||0),0);
    const expense = fsData.finances.filter(f=>f.type==='expense').reduce((s,f)=>s+(parseFloat(f.amount)||0),0);
    body.innerHTML = `
      <div class="metrics-row">
        <div class="metric-card"><div class="metric-val green">₹${(received/1000).toFixed(0)}k</div><div class="metric-label">In</div></div>
        <div class="metric-card"><div class="metric-val yellow">₹${(pending/1000).toFixed(0)}k</div><div class="metric-label">Pending</div></div>
        <div class="metric-card"><div class="metric-val red">₹${(expense/1000).toFixed(0)}k</div><div class="metric-label">Out</div></div>
      </div>
      ${fsData.finances.map(f => `
        <div class="data-row">
          <div class="data-row-left">
            <div class="data-name">${f.name||'—'}</div>
            <div class="data-sub">${f.bank||''}</div>
          </div>
          <div style="text-align:right">
            <div class="data-val" style="color:${f.type==='received'?'var(--green)':f.type==='expense'?'var(--red)':'var(--accent)'}">₹${parseFloat(f.amount||0).toLocaleString('en-IN')}</div>
            <span class="badge ${f.type==='received'?'active':f.type==='expense'?'':'pending'}">${f.type||''}</span>
          </div>
        </div>`).join('') || '<div class="empty">No transactions</div>'}`;
  }
}

// ── TOAST ─────────────────────────────────────────────────
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
</body>
