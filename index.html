<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#080808" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Flow" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta name="version" content="2.1" />
  <title>Flow</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#080808;--bg2:#101010;--bg3:#181818;
      --border:#1e1e1e;--border2:#282828;
      --text:#efefef;--text2:#777;--text3:#333;
      --accent:#c8ff00;--accent-dim:rgba(200,255,0,0.08);
      --red:#ff4040;--green:#00e87a;--blue:#4da6ff;--purple:#b97cff;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:13px}
    #auth{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:999}
    .auth-wordmark{font-family:'Instrument Serif',serif;font-size:72px;color:var(--text);letter-spacing:-3px;line-height:1;margin-bottom:6px}
    .auth-sub{font-size:10px;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-bottom:48px}
    .auth-input{background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-family:'DM Mono',monospace;font-size:18px;padding:12px 0;width:200px;text-align:center;letter-spacing:6px;outline:none;margin-bottom:24px}
    .auth-input:focus{border-bottom-color:var(--accent)}
    .auth-input::placeholder{color:var(--text3);letter-spacing:3px;font-size:14px}
    .auth-btn{background:none;border:1px solid var(--border2);color:var(--text2);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;padding:10px 24px;cursor:pointer;margin-bottom:12px}
    .auth-faceid{background:none;border:none;color:var(--text3);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;padding:8px;margin-top:4px}
    .auth-error{font-size:10px;color:var(--red);letter-spacing:1px;margin-top:12px;display:none}
    #app{display:none;flex-direction:column;height:100%;height:100dvh}
    header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg)}
    .wordmark{font-family:'Instrument Serif',serif;font-size:26px;letter-spacing:-1px;color:var(--text)}
    .wordmark span{color:var(--accent)}
    .header-actions{display:flex;gap:10px;align-items:center}
    .icon-btn{background:none;border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:4px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
    .icon-btn:active{background:var(--bg3)}
    .status-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    #task-bar{display:flex;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
    #task-bar::-webkit-scrollbar{display:none}
    .task-pill{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:11px;white-space:nowrap;flex-shrink:0;cursor:pointer;border:1px solid transparent}
    .task-pill.overdue{background:rgba(255,64,64,.1);border-color:rgba(255,64,64,.2);color:var(--red)}
    .task-pill.today{background:rgba(200,255,0,.08);border-color:rgba(200,255,0,.15);color:var(--accent)}
    .task-pill.upcoming{background:var(--bg2);border-color:var(--border);color:var(--text2)}
    .task-pill.done{background:rgba(0,232,122,.06);border-color:rgba(0,232,122,.1);color:var(--green)}
    .pill-count{font-family:'Syne',sans-serif;font-weight:700;font-size:13px}
    #chat{flex:1;overflow-y:auto;padding:20px 16px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
    #chat::-webkit-scrollbar{width:2px}
    #chat::-webkit-scrollbar-thumb{background:var(--border2)}
    .msg{margin-bottom:20px;animation:fadeUp .2s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .msg-role{font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;color:var(--text3)}
    .msg.user .msg-role{color:var(--accent);opacity:.6}
    .msg-bubble{padding:12px 14px;border-radius:2px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
    .msg.user .msg-bubble{background:#161616;border-left:2px solid var(--accent)}
    .msg.ai .msg-bubble{background:#0e0e0e;border-left:2px solid var(--border2)}
    .msg.system .msg-bubble{background:transparent;border-left:none;color:var(--text3);font-size:11px;padding:4px 0}
    .action-card{margin-top:10px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:10px 12px;font-size:11px;color:var(--text2)}
    .action-card .action-title{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
    .typing{display:flex;gap:4px;padding:12px 14px;background:#0e0e0e;border-left:2px solid var(--border2);border-radius:2px;width:fit-content}
    .typing span{width:4px;height:4px;background:var(--text3);border-radius:50%;animation:blink 1.2s infinite}
    .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
    @keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
    #quick-prompts{padding:10px 16px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;border-top:1px solid var(--border)}
    #quick-prompts::-webkit-scrollbar{display:none}
    .quick-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-family:'DM Mono',monospace;font-size:11px;padding:7px 12px;border-radius:2px;cursor:pointer;white-space:nowrap;flex-shrink:0}
    .quick-btn:active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
    #input-bar{display:flex;align-items:flex-end;gap:10px;padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));border-top:1px solid var(--border);background:var(--bg);flex-shrink:0}
    #msg-input{flex:1;background:var(--bg2);border:1px solid var(--border2);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:10px 14px;border-radius:4px;outline:none;resize:none;max-height:120px;min-height:40px;line-height:1.5}
    #msg-input::placeholder{color:var(--text3)}
    #send-btn{background:var(--accent);color:#000;border:none;width:40px;height:40px;border-radius:4px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    #send-btn:disabled{opacity:.3;cursor:default}
    #panel{position:fixed;inset:0;background:var(--bg);z-index:50;transform:translateX(100%);transition:transform .25s ease;display:flex;flex-direction:column}
    #panel.open{transform:translateX(0)}
    .panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
    .panel-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
    .panel-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
    .panel-tabs::-webkit-scrollbar{display:none}
    .ptab{flex:1;min-width:60px;padding:10px 8px;text-align:center;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
    .ptab.active{color:var(--accent);border-bottom-color:var(--accent)}
    .panel-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .data-row{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer}
    .data-row-left{flex:1;min-width:0}
    .data-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .data-sub{font-size:11px;color:var(--text2);margin-top:2px}
    .data-val{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--accent);flex-shrink:0}
    .section-label{padding:12px 20px 6px;font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
    .metrics-row{display:grid;gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
    .metrics-row.col3{grid-template-columns:repeat(3,1fr)}.metrics-row.col2{grid-template-columns:repeat(2,1fr)}
    .metric-card{background:var(--bg);padding:16px 12px;text-align:center}
    .metric-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-1px}
    .metric-val.green{color:var(--green)}.metric-val.yellow{color:var(--accent)}.metric-val.red{color:var(--red)}.metric-val.blue{color:var(--blue)}.metric-val.purple{color:var(--purple)}
    .metric-label{font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:4px}
    .badge{font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:2px;display:inline-block}
    .badge.active{background:rgba(0,232,122,.1);color:var(--green)}.badge.invoiced{background:rgba(77,166,255,.1);color:var(--blue)}.badge.done{background:rgba(100,100,100,.1);color:var(--text3)}.badge.pending{background:rgba(200,255,0,.08);color:var(--accent)}.badge.high{color:var(--red)}.badge.card{background:rgba(185,124,255,.1);color:var(--purple)}
    .panel-add-btn{margin:16px 20px;padding:10px;background:var(--bg2);border:1px dashed var(--border2);color:var(--text3);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:2px;width:calc(100% - 40px);text-align:center}
    .panel-add-btn:active{border-color:var(--accent);color:var(--accent)}
    .form-field{margin-bottom:14px}
    .form-label{font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
    .form-input,.form-select,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:10px 12px;border-radius:4px;outline:none;appearance:none}
    .form-textarea{resize:vertical;min-height:80px;line-height:1.5}
    .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
    .form-actions{display:flex;gap:10px;margin-top:20px;padding-bottom:32px}
    .btn-primary{flex:1;background:var(--accent);color:#000;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;padding:12px;border:none;border-radius:4px;cursor:pointer}
    .btn-secondary{background:var(--bg3);color:var(--text2);font-family:'Syne',sans-serif;font-weight:600;font-size:12px;letter-spacing:1px;padding:12px 16px;border:1px solid var(--border2);border-radius:4px;cursor:pointer}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:60;display:none;align-items:flex-end}
    .modal-overlay.open{display:flex}
    .modal{width:100%;background:var(--bg2);border-top:1px solid var(--border2);border-radius:12px 12px 0 0;padding:20px;max-height:85vh;overflow-y:auto}
    .modal-handle{width:36px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 20px}
    .modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:20px}
    .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-size:11px;padding:8px 16px;border-radius:2px;opacity:0;transition:all .2s;z-index:999;white-space:nowrap;pointer-events:none}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.ok{color:var(--green)}.toast.err{color:var(--red)}
    .empty{padding:32px 20px;text-align:center;color:var(--text3);font-size:11px}
    .loading{padding:40px 20px;text-align:center;color:var(--text3);font-size:11px}
    .spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .progress-wrap{height:3px;background:var(--border2);border-radius:2px;margin-top:8px}
    .progress-bar{height:100%;border-radius:2px;transition:width .4s ease}

    /* LEFT DRAWER */
    #drawer{position:fixed;inset:0;z-index:70;pointer-events:none}
    #drawer.open{pointer-events:all}
    #drawer-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .25s;pointer-events:none}
    #drawer.open #drawer-overlay{background:rgba(0,0,0,.7);pointer-events:all}
    #drawer-menu{position:absolute;top:0;left:0;bottom:0;width:260px;background:var(--bg2);border-right:1px solid var(--border);transform:translateX(-100%);transition:transform .25s ease;display:flex;flex-direction:column;padding-bottom:max(24px,env(safe-area-inset-bottom))}
    #drawer.open #drawer-menu{transform:translateX(0)}
    .drawer-top{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
    .drawer-wordmark{font-family:'Instrument Serif',serif;font-size:28px;letter-spacing:-1px;color:var(--text)}
    .drawer-wordmark span{color:var(--accent)}
    .drawer-sub{font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
    .drawer-nav{flex:1;padding:12px 0;overflow-y:auto}
    .drawer-section{font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;padding:12px 20px 6px}
    .drawer-item{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;transition:background .1s;border-left:2px solid transparent}
    .drawer-item:active{background:var(--bg3)}
    .drawer-item.active{border-left-color:var(--accent);background:var(--accent-dim)}
    .drawer-item.active .drawer-item-label{color:var(--accent)}
    .drawer-icon{width:20px;text-align:center;font-size:14px;flex-shrink:0}
    .drawer-item-label{font-size:13px;color:var(--text2);letter-spacing:.5px}
    .drawer-item-badge{margin-left:auto;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--red);background:rgba(255,64,64,.1);padding:2px 7px;border-radius:10px}
    .drawer-bottom{padding:16px 20px;border-top:1px solid var(--border)}
    .drawer-logout{display:flex;align-items:center;gap:10px;padding:10px 0;cursor:pointer;color:var(--text3);font-size:12px;letter-spacing:1px}
    .drawer-logout:hover{color:var(--red)}
    /* FITNESS QUICK LOG */
    #fitness-fab{width:40px;height:40px;background:var(--bg2);border:1px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .2s;flex-shrink:0;position:relative}
    #fitness-fab:active{transform:scale(.93)}
    #fitness-fab .fab-ring{position:absolute;inset:-3px;border-radius:50%;border:2px solid transparent;border-top-color:var(--green);border-right-color:var(--green);animation:spin 2s linear infinite;opacity:.4}
    .signal-tag{display:inline-block;font-size:9px;letter-spacing:1px;padding:2px 7px;background:var(--bg3);border:1px solid var(--border2);border-radius:2px;color:var(--text3);margin-right:4px;margin-top:4px}
  </style>
</head>
<body>
<div id="auth">
  <div class="auth-wordmark">Flow</div>
  <div class="auth-sub">AlmostCult Labs</div>
  <input class="auth-input" id="pin" type="password" placeholder="password" autocomplete="off" />
  <button class="auth-btn" onclick="doAuth()">Enter</button>
  <div class="auth-error" id="auth-err">wrong password</div>
</div>
  <div id="app">
  <header>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="wordmark" onclick="openDrawer()" style="cursor:pointer">Flow<span>.</span></div>
    </div>
    <div class="header-actions">
      <div id="refresh-spinner" style="display:none;width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite"></div>
      <div class="status-dot" id="status-dot"></div>
      <button class="icon-btn" onclick="clearChat()">&#8635;</button>
      <button class="icon-btn" onclick="openPanel('tasks')">&#9776;</button>
    </div>
  </header>
  <div id="task-bar"></div>
  <div id="chat"></div>
  <div id="quick-prompts">
    <button class="quick-btn" onclick="quickSend('What is my total outstanding and who owes me the most?')">💰 Outstanding</button>
    <button class="quick-btn" onclick="quickSend('What tasks are overdue or due today?')">🔥 Urgent</button>
    <button class="quick-btn" onclick="quickSend('Give me a full status update on all active projects')">📊 Status</button>
    <button class="quick-btn" onclick="quickSend('What should I focus on today?')">🎯 Focus</button>
    <button class="quick-btn" onclick="quickSend('Summarize this week for me')">📅 Week</button>
  </div>
  <div id="input-bar">
    <div id="fitness-fab" onclick="openPanel('fitness')" title="Log fitness" style="position:static;width:40px;height:40px;box-shadow:none;flex-shrink:0">
      <div class="fab-ring"></div>
      💪
    </div>
    <textarea id="msg-input" placeholder="Ask anything or give a command..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMsg()">&#8593;</button>
  </div>
</div>

<!-- LEFT DRAWER -->
<div id="drawer">
  <div id="drawer-overlay" onclick="closeDrawer()"></div>
  <div id="drawer-menu">
    <div class="drawer-top">
      <div class="drawer-wordmark">Flow<span>.</span></div>
      <div class="drawer-sub">AlmostCult Labs</div>
    </div>
    <div class="drawer-nav">
      <div class="drawer-section">Workspace</div>
      <div class="drawer-item active" id="dnav-chat" onclick="drawerNav('chat')">
        <div class="drawer-icon">◎</div>
        <div class="drawer-item-label">Chat</div>
      </div>
      <div class="drawer-item" id="dnav-tasks" onclick="drawerNav('tasks')">
        <div class="drawer-icon">✓</div>
        <div class="drawer-item-label">Tasks</div>
        <div class="drawer-item-badge" id="dnav-tasks-badge"></div>
      </div>
      <div class="drawer-item" id="dnav-projects" onclick="drawerNav('projects')">
        <div class="drawer-icon">◈</div>
        <div class="drawer-item-label">Projects</div>
      </div>
      <div class="drawer-section">Personal</div>
      <div class="drawer-item" id="dnav-fitness" onclick="drawerNav('fitness')">
        <div class="drawer-icon">◉</div>
        <div class="drawer-item-label">Fitness</div>
      </div>
      <div class="drawer-item" id="dnav-signal" onclick="drawerNav('signal')">
        <div class="drawer-icon">⚡</div>
        <div class="drawer-item-label">Signal</div>
      </div>
      <div class="drawer-item" id="dnav-history" onclick="drawerNav('history')">
        <div class="drawer-icon">◷</div>
        <div class="drawer-item-label">Chat History</div>
      </div>
      <div class="drawer-section">Finance</div>
      <div class="drawer-item" id="dnav-finances" onclick="drawerNav('finances')">
        <div class="drawer-icon">₹</div>
        <div class="drawer-item-label">Finances</div>
      </div>
    </div>
    <div class="drawer-bottom">
      <div class="drawer-logout" onclick="logout()">
        <span>⎋</span> <span>Log out</span>
      </div>
    </div>
  </div>
</div>
<div id="panel">
  <div class="panel-header">
    <div class="panel-title" id="panel-title">Tasks</div>
    <button class="icon-btn" onclick="closePanel()">&#10005;</button>
  </div>
  <div class="panel-tabs">
    <div class="ptab active" onclick="switchPTab('tasks')">Tasks</div>
    <div class="ptab" onclick="switchPTab('projects')">Projects</div>
    <div class="ptab" onclick="switchPTab('finances')">Finances</div>
    <div class="ptab" onclick="switchPTab('fitness')" id="ptab-fitness" style="display:none">Fitness</div>
    <div class="ptab" onclick="switchPTab('signal')" id="ptab-signal" style="display:none">Signal</div>
    <div class="ptab" onclick="switchPTab('history')" id="ptab-history" style="display:none">History</div>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const PASSWORD="almostcult";
const CLAUDE_ENDPOINT="https://api.adii.work/claude";
const WORKER_SECRET="almostcult";
const FIREBASE_KEY="AIzaSyDCbo5QmuGYoqfB3lWSbk4DRJiYqBQFU7k";
const FIRESTORE="https://firestore.googleapis.com/v1/projects/flow-2dfcf/databases/(default)/documents";
let chatHistory=JSON.parse(sessionStorage.getItem('flow-chat-history')||'[]');

async function boot(){autoResize();await loadAll();restoreChat();}
async function loadAll(){
  try{
    const[p,t,f,fit,th]=await Promise.all([fsGet('projects'),fsGet('tasks'),fsGet('finances'),fsGet('fitness'),fsGet('thoughts')]);
    fsData={projects:p,tasks:t,finances:f,fitness:fit,thoughts:th};
    renderTaskBar();if(currentPTab)renderPanelContent();
    updateDrawerBadges();
  }catch(e){console.error(e);}
}
function renderTaskBar(){
  const today=new Date().toISOString().split('T')[0];
  const tomorrow=new Date(Date.now()+86400000).toISOString().split('T')[0];
  const ov=fsData.tasks.filter(t=>t.due&&t.due<today&&t.status!=='done').length;
  const td=fsData.tasks.filter(t=>t.due===today&&t.status!=='done').length;
  const up=fsData.tasks.filter(t=>t.due===tomorrow&&t.status!=='done').length;
  const dn=fsData.tasks.filter(t=>t.status==='done').length;
  document.getElementById('task-bar').innerHTML=`
    <div class="task-pill overdue" onclick="quickSend('Show overdue tasks')"><span class="pill-count">${ov}</span>overdue</div>
    <div class="task-pill today" onclick="quickSend('Tasks due today?')"><span class="pill-count">${td}</span>today</div>
    <div class="task-pill upcoming" onclick="quickSend('Tasks due tomorrow?')"><span class="pill-count">${up}</span>tomorrow</div>
    <div class="task-pill done"><span class="pill-count">${dn}</span>done</div>`;
}
async function fsGet(col){
  const res=await fetch(`${FIRESTORE}/${col}?key=${FIREBASE_KEY}&pageSize=100`);
  const data=await res.json();
  if(!data.documents)return[];
  return data.documents.map(doc=>{
    const id=doc.name.split('/').pop();const fields={};
    for(const[k,v]of Object.entries(doc.fields||{})){
      if('stringValue'in v)fields[k]=v.stringValue;
      else if('integerValue'in v)fields[k]=Number(v.integerValue);
      else if('doubleValue'in v)fields[k]=Number(v.doubleValue);
      else if('booleanValue'in v)fields[k]=v.booleanValue;
      else fields[k]='';
    }
    return{id,...fields};
  });
}
async function fsWrite(col,id,fields){
  const fsFields={};
  for(const[k,v]of Object.entries(fields)){
    if(typeof v==='number'||(!isNaN(v)&&v!==''))fsFields[k]={integerValue:String(Math.round(Number(v)))};
    else fsFields[k]={stringValue:String(v)};
  }
  const mask=Object.keys(fields).map(k=>`updateMask.fieldPaths=${k}`).join('&');
  const url=id?`${FIRESTORE}/${col}/${id}?${mask}&key=${FIREBASE_KEY}`:`${FIRESTORE}/${col}?documentId=doc_${Date.now()}&key=${FIREBASE_KEY}`;
  const res=await fetch(url,{method:id?'PATCH':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields:fsFields})});
  return res.json();
}
async function fsDelete(col,id){await fetch(`${FIRESTORE}/${col}/${id}?key=${FIREBASE_KEY}`,{method:'DELETE'});}

async function sendToClaude(userMsg){
  chatHistory.push({role:'user',content:userMsg});
  const res=await fetch(CLAUDE_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json','x-secret':WORKER_SECRET},body:JSON.stringify({model:'claude-sonnet-4-5-20250929',max_tokens:1000,system:buildSystemPrompt(),messages:chatHistory})});
  const data=await res.json();
  if(data.error)throw new Error(data.error.message||JSON.stringify(data.error));
  const rawText=data.content?.[0]?.text||'Something went wrong.';
  const actionMatches=[...rawText.matchAll(/<action>([\s\S]*?)<\/action>/g)];
  const cleanText=rawText.replace(/<action>[\s\S]*?<\/action>/g,'').trim();
  chatHistory.push({role:'assistant',content:rawText});
  sessionStorage.setItem('flow-chat-history',JSON.stringify(chatHistory.slice(-20)));
  let actionsExecuted=[];
  for(const match of actionMatches){
    try{
      const cmd=JSON.parse(match[1].trim());
      if(cmd.op==='update'){await fsWrite(cmd.collection,cmd.id,cmd.fields);actionsExecuted.push(`Updated ${cmd.collection}/${cmd.id}`);}
      else if(cmd.op==='create'){await fsWrite(cmd.collection,null,cmd.fields);actionsExecuted.push(`Created in ${cmd.collection}`);}
      else if(cmd.op==='delete'){await fsDelete(cmd.collection,cmd.id);actionsExecuted.push(`Deleted ${cmd.collection}/${cmd.id}`);}
    }catch(e){actionsExecuted.push(`Action failed: ${e.message}`);}
  }
  if(actionsExecuted.length){await loadAll();renderPanelContent();}
  saveChatSession(userMsg,cleanText).catch(()=>{});
  return{text:cleanText,actions:actionsExecuted};
}

function addMsg(role,text,actions=[],save=true){
  const chat=document.getElementById('chat');
  const div=document.createElement('div');div.className=`msg ${role}`;
  const roleLabel=role==='user'?'You':role==='ai'?'Flow':'';
  div.innerHTML=`${roleLabel?`<div class="msg-role">${roleLabel}</div>`:''}
    <div class="msg-bubble">${escHtml(text)}</div>
    ${actions.length?`<div class="action-card"><div class="action-title">Actions taken</div>${actions.map(a=>`<div>&#8594; ${escHtml(a)}</div>`).join('')}</div>`:''}`;
  chat.appendChild(div);chat.scrollTop=chat.scrollHeight;
  if(save){const saved=JSON.parse(sessionStorage.getItem('flow-chat-ui')||'[]');saved.push({role,text,actions});if(saved.length>50)saved.splice(0,saved.length-50);sessionStorage.setItem('flow-chat-ui',JSON.stringify(saved));}
}
function restoreChat(){
  const saved=JSON.parse(sessionStorage.getItem('flow-chat-ui')||'[]');
  if(saved.length>0)saved.forEach(m=>addMsg(m.role,m.text,m.actions||[],false));else greet();
}
function greet(){
  const hour=new Date().getHours();
  const g=hour<12?'Good morning':hour<17?'Good afternoon':'Good evening';
  const today=new Date().toISOString().split('T')[0];
  const summary=fsData.finances.find(f=>f.id==='summary')||{};
  const outstanding=summary.total_outstanding||0;
  const overdue=fsData.tasks.filter(t=>t.due&&t.due<today&&t.status!=='done').length;
  const dueToday=fsData.tasks.filter(t=>t.due===today&&t.status!=='done').length;
  const active=fsData.projects.filter(p=>p.status&&p.status.toLowerCase().includes('progress')).length;
  addMsg('ai',`${g}, Aditya.

— ${active} active project${active!==1?'s':''}
— ${overdue} overdue task${overdue!==1?'s':''}, ${dueToday} due today
— Rs${outstanding.toLocaleString('en-IN')} outstanding

What do you want to work on?`);
}
function showTyping(){const chat=document.getElementById('chat');const div=document.createElement('div');div.className='msg ai';div.id='typing-indicator';div.innerHTML=`<div class="msg-role">Flow</div><div class="typing"><span></span><span></span><span></span></div>`;chat.appendChild(div);chat.scrollTop=chat.scrollHeight;}
function hideTyping(){document.getElementById('typing-indicator')?.remove();}
function escHtml(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
async function sendMsg(){
  if(isThinking)return;
  const input=document.getElementById('msg-input');const text=input.value.trim();if(!text)return;
  input.value='';input.style.height='auto';isThinking=true;document.getElementById('send-btn').disabled=true;
  addMsg('user',text);showTyping();
  try{const{text:reply,actions}=await sendToClaude(text);hideTyping();addMsg('ai',reply,actions);if(actions.length)toast('Data updated','ok');}
  catch(e){hideTyping();addMsg('system','Failed to reach Claude. Check your connection.');}
  isThinking=false;document.getElementById('send-btn').disabled=false;input.focus();
}
function quickSend(text){document.getElementById('msg-input').value=text;sendMsg();}
function clearChat(){chatHistory=[];sessionStorage.removeItem('flow-chat-history');sessionStorage.removeItem('flow-chat-ui');document.getElementById('chat').innerHTML='';greet();}
function autoResize(){
  const input=document.getElementById('msg-input');
  input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,120)+'px';});
  input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
}
function openPanel(tab){
  const hiddenTabs = ['fitness','signal','history'];
  hiddenTabs.forEach(t => {
    const el = document.getElementById(`ptab-${t}`);
    if(el) el.style.display = t === tab ? '' : 'none';
  });
  if(tab){
    currentPTab=tab;
    document.querySelectorAll('.ptab').forEach((el,i)=>{
      el.classList.toggle('active',['tasks','projects','finances','fitness','signal','history'][i]===tab);
    });
    const titles = {tasks:'Tasks',projects:'Projects',finances:'Finances',fitness:'Fitness',signal:'Signal',history:'History'};
    const titleEl = document.getElementById('panel-title');
    if(titleEl) titleEl.textContent = titles[tab]||'Data';
  }
  document.getElementById('panel').classList.add('open');
  renderPanelContent();
}
function closePanel(){document.getElementById('panel').classList.remove('open');}

function showRefreshSpinner(){const s=document.getElementById('refresh-spinner');const d=document.getElementById('status-dot');if(s)s.style.display='block';if(d)d.style.display='none';}
function hideRefreshSpinner(){const s=document.getElementById('refresh-spinner');const d=document.getElementById('status-dot');if(s)s.style.display='none';if(d)d.style.display='block';}

function openDrawer(){document.getElementById('drawer').classList.add('open');}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');}

function drawerNav(section){
  closeDrawer();
  // Update active state
  document.querySelectorAll('.drawer-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById(`dnav-${section}`);
  if(el)el.classList.add('active');
  if(section==='chat'){
    // Just close drawer, stay on chat
  } else {
    openPanel(section);
  }
}

function updateDrawerBadges(){

  const urgent=fsData.tasks.filter(t=>(t.due&&t.due<=today)&&t.status!=='done').length;
  const badge=document.getElementById('dnav-tasks-badge');
  if(badge){badge.textContent=urgent||'';badge.style.display=urgent?'':'none';}
}
function switchPTab(tab){
  currentPTab=tab;
  document.querySelectorAll('.ptab').forEach((el,i)=>{el.classList.toggle('active',['tasks','projects','finances','fitness','signal','history'][i]===tab);});
  renderPanelContent();
}
function getBadge(status){
  if(!status)return'pending';const s=status.toLowerCase();
  if(s.includes('progress')||s==='active')return'active';
  if(s.includes('invoice'))return'invoiced';
  if(s==='done'||s==='completed')return'done';
  return'pending';
}

        <div class="metric-card"><div class="metric-val blue">${latest.weight||'—'}</div><div class="metric-label">kg today</div></div>
        <div class="metric-card"><div class="metric-val yellow">${avgCal}</div><div class="metric-label">avg kcal</div></div>
        <div class="metric-card"><div class="metric-val green">${avgProt}g</div><div class="metric-label">avg protein</div></div>
      </div>
      <div class="section-label">Recent Logs</div>
      ${recent.map(f=>{const cp=Math.min((parseFloat(f.calories)||0)/2000*100,100);const pp=Math.min((parseFloat(f.protein)||0)/150*100,100);
        return`<div class="data-row" style="flex-direction:column;align-items:flex-start;gap:8px" onclick="openEditModal('fitness','${f.id}')">
          <div style="display:flex;justify-content:space-between;width:100%"><div class="data-name">${formatDate(f.date)}</div><div class="data-val" style="font-size:13px">${f.weight||'—'} kg</div></div>
          <div style="display:flex;gap:16px;width:100%;font-size:11px;color:var(--text2)">
            <div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span>Cal</span><span>${f.calories||0}</span></div><div class="progress-wrap"><div class="progress-bar" style="width:${cp}%;background:var(--accent)"></div></div></div>
            <div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span>Protein</span><span>${f.protein||0}g</span></div><div class="progress-wrap"><div class="progress-bar" style="width:${pp}%;background:var(--green)"></div></div></div>
          </div>${f.notes?`<div style="font-size:11px;color:var(--text3)">${escHtml(f.notes)}</div>`:''}</div>`;}).join('')||'<div class="empty">No fitness data yet<br><br>Tell Flow to log your stats or tap + Log Today</div>'}`;

  }else if(currentPTab==='signal'){
    const raw=fsData.thoughts.filter(t=>t.status==='raw'||!t.status).sort((a,b)=>(b.created||'').localeCompare(a.created||''));
    const actioned=fsData.thoughts.filter(t=>t.status==='actioned');
    body.innerHTML=`<button class="panel-add-btn" onclick="openAddModal('signal')">+ New Signal</button>
      <div class="section-label">Raw (${raw.length})</div>
      ${raw.map(t=>`<div class="data-row" style="flex-direction:column;align-items:flex-start;gap:6px" onclick="openEditModal('signal','${t.id}')">
        <div class="data-sub" style="font-size:10px">${formatDate(t.created||'')}</div>
        <div style="font-size:13px;line-height:1.5;color:var(--text)">${escHtml(t.text||'')}</div>
        <div>${(t.tags||'').split(',').filter(Boolean).map(tag=>`<span class="signal-tag">${tag.trim()}</span>`).join('')}${t.linked_project?`<span class="signal-tag" style="color:var(--accent)">${t.linked_project}</span>`:''}</div>
      </div>`).join('')||'<div class="empty">No raw signals</div>'}
      ${actioned.length?`<div class="section-label">Actioned (${actioned.length})</div>${actioned.map(t=>`<div class="data-row" style="opacity:.4"><div style="font-size:12px;text-decoration:line-through">${escHtml((t.text||'').substring(0,60))}...</div></div>`).join('')}`:''}`;

  }else if(currentPTab==='history'){
    body.innerHTML=`<div class="loading"><div class="spinner"></div>Loading...</div>`;
    loadChatHistory().then(sessions=>{
      if(!sessions.length){body.innerHTML='<div class="empty">No chat history yet</div>';return;}
      body.innerHTML=`<div style="padding:12px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)">
          <span style="font-size:10px;color:var(--text3);letter-spacing:1px">${sessions.length} sessions</span>
          <button onclick="summariseHistory()" style="background:none;border:1px solid var(--border2);color:var(--text2);font-family:'DM Mono',monospace;font-size:10px;padding:5px 10px;border-radius:2px;cursor:pointer;letter-spacing:1px">SUMMARISE</button>
        </div>
        ${sessions.map(s=>`<div class="data-row" style="flex-direction:column;align-items:flex-start;gap:6px" onclick="expandSession('${s.id}')">
          <div style="display:flex;justify-content:space-between;width:100%"><div class="data-name" style="font-size:12px">${s.date}</div><span style="font-size:10px;color:var(--text3)">${s.count} msgs</span></div>
          <div id="session-${s.id}" style="display:none;width:100%"></div>
        </div>`).join('')}`;
    });
  }
}

function openModal(title,html){document.getElementById('modal-title').textContent=title;document.getElementById('modal-body').innerHTML=html;document.getElementById('modal-overlay').classList.add('open');}
function closeModal(e){if(!e||e.target===document.getElementById('modal-overlay'))document.getElementById('modal-overlay').classList.remove('open');}
function closeModalForce(){document.getElementById('modal-overlay').classList.remove('open');}
function getVal(id){return document.getElementById(id)?.value||'';}

function openAddModal(type){
  const today=new Date().toISOString().split('T')[0];
  if(type==='task')openModal('New Task',`<div class="form-field"><div class="form-label">Title</div><input class="form-input" id="f-title" placeholder="Task title"/></div><div class="form-field"><div class="form-label">Project</div><input class="form-input" id="f-project" placeholder="Related project"/></div><div class="form-field"><div class="form-label">Priority</div><select class="form-select" id="f-priority"><option>normal</option><option>high</option></select></div><div class="form-field"><div class="form-label">Due Date</div><input class="form-input" id="f-due" type="date"/></div><div class="form-actions"><button class="btn-secondary" onclick="closeModalForce()">Cancel</button><button class="btn-primary" onclick="saveNew('task')">Save</button></div>`);
  else if(type==='project')openModal('New Project',`<div class="form-field"><div class="form-label">Client</div><input class="form-input" id="f-client"/></div><div class="form-field"><div class="form-label">Project</div><input class="form-input" id="f-pname"/></div><div class="form-field"><div class="form-label">Status</div><select class="form-select" id="f-status"><option>In Progress</option><option>Not Started</option><option>Pending</option><option>Done</option></select></div><div class="form-field"><div class="form-label">Total (Rs)</div><input class="form-input" id="f-total" type="number" placeholder="0"/></div><div class="form-field"><div class="form-label">Pending (Rs)</div><input class="form-input" id="f-pending" type="number" placeholder="0"/></div><div class="form-field"><div class="form-label">Notes</div><input class="form-input" id="f-notes"/></div><div class="form-actions"><button class="btn-secondary" onclick="closeModalForce()">Cancel</button><button class="btn-primary" onclick="saveNew('project')">Save</button></div>`);
  else if(type==='fitness')openModal('Log Fitness',`<div class="form-field"><div class="form-label">Date</div><input class="form-input" id="f-date" type="date" value="${today}"/></div><div class="form-field"><div class="form-label">Weight (kg)</div><input class="form-input" id="f-weight" type="number" step="0.1"/></div><div class="form-field"><div class="form-label">Calories</div><input class="form-input" id="f-calories" type="number"/></div><div class="form-field"><div class="form-label">Protein (g)</div><input class="form-input" id="f-protein" type="number"/></div><div class="form-field"><div class="form-label">Notes</div><input class="form-input" id="f-fnotes" placeholder="Workout, diet notes..."/></div><div class="form-actions"><button class="btn-secondary" onclick="closeModalForce()">Cancel</button><button class="btn-primary" onclick="saveNew('fitness')">Save</button></div>`);
  else if(type==='signal')openModal('New Signal',`<div class="form-field"><div class="form-label">Idea / Thought</div><textarea class="form-textarea" id="f-text" placeholder="Dump your raw thought here..."></textarea></div><div class="form-field"><div class="form-label">Tags (comma separated)</div><input class="form-input" id="f-tags" placeholder="kinuav, reel, edit"/></div><div class="form-field"><div class="form-label">Linked Project</div><input class="form-input" id="f-linked"/></div><div class="form-actions"><button class="btn-secondary" onclick="closeModalForce()">Cancel</button><button class="btn-primary" onclick="saveNew('signal')">Save</button></div>`);
}

function openEditModal(type,id){
  if(type==='task'){const t=fsData.tasks.find(x=>x.id===id)||{};openModal('Edit Task',`<div class="form-field"><div class="form-label">Title</div><input class="form-input" id="f-title" value="${escHtml(t.title||'')}"/></div><div class="form-field"><div class="form-label">Project</div><input class="form-input" id="f-project" value="${escHtml(t.project||'')}"/></div><div class="form-field"><div class="form-label">Priority</div><select class="form-select" id="f-priority"><option ${t.priority==='normal'?'selected':''}>normal</option><option ${t.priority==='high'?'selected':''}>high</option></select></div><div class="form-field"><div class="form-label">Due Date</div><input class="form-input" id="f-due" type="date" value="${t.due||''}"/></div><div class="form-field"><div class="form-label">Status</div><select class="form-select" id="f-status"><option ${t.status==='pending'?'selected':''}>pending</option><option ${t.status==='in progress'?'selected':''}>in progress</option><option ${t.status==='done'?'selected':''}>done</option></select></div><div class="form-actions"><button class="btn-secondary" onclick="deleteItem('tasks','${id}')">Delete</button><button class="btn-primary" onclick="saveEdit('task','${id}')">Save</button></div>`);}
  else if(type==='project'){const p=fsData.projects.find(x=>x.id===id)||{};openModal('Edit Project',`<div class="form-field"><div class="form-label">Client</div><input class="form-input" id="f-client" value="${escHtml(p.client||'')}"/></div><div class="form-field"><div class="form-label">Project</div><input class="form-input" id="f-pname" value="${escHtml(p.project||'')}"/></div><div class="form-field"><div class="form-label">Status</div><input class="form-input" id="f-status" value="${escHtml(p.status||'')}"/></div><div class="form-field"><div class="form-label">Total (Rs)</div><input class="form-input" id="f-total" type="number" value="${p.total||0}"/></div><div class="form-field"><div class="form-label">Pending (Rs)</div><input class="form-input" id="f-pending" type="number" value="${p.pending||0}"/></div><div class="form-field"><div class="form-label">Invoice</div><input class="form-input" id="f-invoice" value="${escHtml(p.invoice||'')}"/></div><div class="form-field"><div class="form-label">Notes</div><input class="form-input" id="f-notes" value="${escHtml(p.notes||'')}"/></div><div class="form-actions"><button class="btn-secondary" onclick="deleteItem('projects','${id}')">Delete</button><button class="btn-primary" onclick="saveEdit('project','${id}')">Save</button></div>`);}
  else if(type==='fitness'){const f=fsData.fitness.find(x=>x.id===id)||{};openModal('Edit Log',`<div class="form-field"><div class="form-label">Date</div><input class="form-input" id="f-date" type="date" value="${f.date||''}"/></div><div class="form-field"><div class="form-label">Weight (kg)</div><input class="form-input" id="f-weight" type="number" step="0.1" value="${f.weight||''}"/></div><div class="form-field"><div class="form-label">Calories</div><input class="form-input" id="f-calories" type="number" value="${f.calories||''}"/></div><div class="form-field"><div class="form-label">Protein (g)</div><input class="form-input" id="f-protein" type="number" value="${f.protein||''}"/></div><div class="form-field"><div class="form-label">Notes</div><input class="form-input" id="f-fnotes" value="${escHtml(f.notes||'')}"/></div><div class="form-actions"><button class="btn-secondary" onclick="deleteItem('fitness','${id}')">Delete</button><button class="btn-primary" onclick="saveEdit('fitness','${id}')">Save</button></div>`);}
  else if(type==='signal'){const t=fsData.thoughts.find(x=>x.id===id)||{};openModal('Edit Signal',`<div class="form-field"><div class="form-label">Idea</div><textarea class="form-textarea" id="f-text">${escHtml(t.text||'')}</textarea></div><div class="form-field"><div class="form-label">Tags</div><input class="form-input" id="f-tags" value="${escHtml(t.tags||'')}"/></div><div class="form-field"><div class="form-label">Linked Project</div><input class="form-input" id="f-linked" value="${escHtml(t.linked_project||'')}"/></div><div class="form-field"><div class="form-label">Status</div><select class="form-select" id="f-sigstatus"><option ${t.status==='raw'?'selected':''}>raw</option><option ${t.status==='actioned'?'selected':''}>actioned</option></select></div><div class="form-actions"><button class="btn-secondary" onclick="deleteItem('thoughts','${id}')">Delete</button><button class="btn-primary" onclick="saveEdit('signal','${id}')">Save</button></div>`);}
}

async function saveNew(type){
  let fields={},col='';const today=new Date().toISOString().split('T')[0];
  if(type==='task'){col='tasks';fields={title:getVal('f-title'),project:getVal('f-project'),priority:getVal('f-priority'),due:getVal('f-due'),status:'pending'};}
  else if(type==='project'){col='projects';fields={client:getVal('f-client'),project:getVal('f-pname'),status:getVal('f-status'),total:getVal('f-total')||0,pending:getVal('f-pending')||0,notes:getVal('f-notes'),invoice:''};}
  else if(type==='fitness'){col='fitness';fields={date:getVal('f-date')||today,weight:getVal('f-weight'),calories:getVal('f-calories'),protein:getVal('f-protein'),notes:getVal('f-fnotes')};}
  else if(type==='signal'){col='thoughts';fields={text:getVal('f-text'),tags:getVal('f-tags'),linked_project:getVal('f-linked'),created:today,status:'raw'};}
  await fsWrite(col,null,fields);closeModalForce();await loadAll();renderPanelContent();toast('Saved','ok');
}
async function saveEdit(type,id){
  let fields={},col='';
  if(type==='task'){col='tasks';fields={title:getVal('f-title'),project:getVal('f-project'),priority:getVal('f-priority'),due:getVal('f-due'),status:getVal('f-status')};}
  else if(type==='project'){col='projects';fields={client:getVal('f-client'),project:getVal('f-pname'),status:getVal('f-status'),total:getVal('f-total')||0,pending:getVal('f-pending')||0,invoice:getVal('f-invoice'),notes:getVal('f-notes')};}
  else if(type==='fitness'){col='fitness';fields={date:getVal('f-date'),weight:getVal('f-weight'),calories:getVal('f-calories'),protein:getVal('f-protein'),notes:getVal('f-fnotes')};}
  else if(type==='signal'){col='thoughts';fields={text:getVal('f-text'),tags:getVal('f-tags'),linked_project:getVal('f-linked'),status:getVal('f-sigstatus')};}
  await fsWrite(col,id,fields);closeModalForce();await loadAll();renderPanelContent();toast('Updated','ok');
}
async function deleteItem(col,id){await fsDelete(col,id);closeModalForce();await loadAll();renderPanelContent();toast('Deleted','ok');}

async function saveChatSession(userMsg,aiReply){const now=new Date();await fsWrite('chat_history',null,{date:now.toISOString().split('T')[0],user:userMsg,ai:aiReply.substring(0,500),timestamp:now.toISOString()});}
async function loadChatHistory(){
  try{
    const docs=await fsGet('chat_history');const grouped={};
    docs.sort((a,b)=>(b.timestamp||'').localeCompare(a.timestamp||'')).forEach(d=>{const date=d.date||'Unknown';if(!grouped[date])grouped[date]={id:date,date:formatDate(date),count:0,msgs:[]};grouped[date].count++;grouped[date].msgs.push(d);});
    return Object.values(grouped);
  }catch(e){return[];}
}
function expandSession(dateId){
  const el=document.getElementById(`session-${dateId}`);if(!el)return;
  if(el.style.display==='none'){
    el.style.display='block';
    loadChatHistory().then(sessions=>{const s=sessions.find(x=>x.id===dateId);if(!s)return;
      el.innerHTML=s.msgs.map(m=>`<div style="margin-bottom:8px;padding:8px;background:var(--bg3);border-radius:2px"><div style="font-size:9px;color:var(--accent);letter-spacing:1px;margin-bottom:3px">YOU</div><div style="font-size:11px;color:var(--text2)">${escHtml(m.user||'')}</div><div style="font-size:9px;color:var(--text3);letter-spacing:1px;margin:5px 0 3px">FLOW</div><div style="font-size:11px;color:var(--text2)">${escHtml((m.ai||'').substring(0,300))}${(m.ai||'').length>300?'...':''}</div></div>`).join('');
    });
  }else{el.style.display='none';}
}
async function summariseHistory(){closePanel();const sessions=await loadChatHistory();const allMsgs=sessions.flatMap(s=>s.msgs).slice(-30);const prompt='Summarise our recent conversations - what did we work on, decisions made, still open?\n\n'+allMsgs.map(m=>'Me: '+m.user+'\nFlow: '+m.ai).join('\n\n');document.getElementById('msg-input').value=prompt;sendMsg();}
function logout(){localStorage.removeItem('flow-ok');sessionStorage.clear();location.reload();}
function toast(msg,type=''){const el=document.getElementById('toast');el.textContent=msg;el.className=`toast ${type} show`;setTimeout(()=>el.classList.remove('show'),2500);}
</script>
</body>
</html>
