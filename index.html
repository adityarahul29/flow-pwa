<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#080808" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Flow" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta name="version" content="2.3" />
  <title>Flow</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#080808;--bg2:#101010;--bg3:#181818;
      --border:#1e1e1e;--border2:#282828;
      --text:#efefef;--text2:#777;--text3:#333;
      --accent:#c8ff00;--accent-dim:rgba(200,255,0,0.08);
      --red:#ff4040;--green:#00e87a;--blue:#4da6ff;--purple:#b97cff;
      --orange:#ff8c42;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:13px}

    /* ── AUTH ── */
    #auth{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:999}
    .auth-wordmark{font-family:'Instrument Serif',serif;font-size:72px;color:var(--text);letter-spacing:-3px;line-height:1;margin-bottom:6px}
    .auth-sub{font-size:10px;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-bottom:48px}
    .auth-input{background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-family:'DM Mono',monospace;font-size:18px;padding:12px 0;width:200px;text-align:center;letter-spacing:6px;outline:none;margin-bottom:24px}
    .auth-input:focus{border-bottom-color:var(--accent)}
    .auth-input::placeholder{color:var(--text3);letter-spacing:3px;font-size:14px}
    .auth-btn{background:none;border:1px solid var(--border2);color:var(--text2);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;padding:10px 24px;cursor:pointer;margin-bottom:12px}
    .auth-error{font-size:10px;color:var(--red);letter-spacing:1px;margin-top:12px;display:none}

    /* ── APP SHELL ── */
    #app{display:none;flex-direction:column;height:100%;height:100dvh}

    /* ── HEADER ── */
    header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg);position:relative;z-index:10}
    .wordmark{font-family:'Instrument Serif',serif;font-size:26px;letter-spacing:-1px;color:var(--text)}
    .wordmark span{color:var(--accent)}
    .header-actions{display:flex;gap:10px;align-items:center}
    .icon-btn{background:none;border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:4px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;position:relative;z-index:10}
    .icon-btn:active{background:var(--bg3)}
    .status-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    /* ── HOME SPLIT ── */
    #home-split{display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden}
    #today-pane{flex:0 0 auto;overflow-y:auto;max-height:42vh;border-bottom:1px solid var(--border);padding:14px 16px 10px;scrollbar-width:none}
    #today-pane::-webkit-scrollbar{display:none}
    .today-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px}
    .today-label{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text3)}
    .today-date-str{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.5px}
    #task-bar{display:flex;gap:7px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
    #task-bar::-webkit-scrollbar{display:none}
    .task-pill{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:10px;white-space:nowrap;flex-shrink:0;cursor:pointer;border:1px solid transparent;letter-spacing:.3px}
    .task-pill.overdue{background:rgba(255,64,64,.1);border-color:rgba(255,64,64,.2);color:var(--red)}
    .task-pill.today{background:rgba(200,255,0,.08);border-color:rgba(200,255,0,.15);color:var(--accent)}
    .task-pill.upcoming{background:var(--bg2);border-color:var(--border);color:var(--text2)}
    .task-pill.done{background:rgba(0,232,122,.06);border-color:rgba(0,232,122,.1);color:var(--green)}
    .pill-count{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;margin-right:1px}
    #today-tasks-list{display:flex;flex-direction:column;gap:5px}
    .ttc{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;cursor:pointer;transition:border-color .15s;animation:ttcIn .18s ease both}
    @keyframes ttcIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
    .ttc:active{background:var(--bg3)}
    .ttc.ov{border-left:2px solid var(--red)}
    .ttc-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0}
    .ttc.ov .ttc-dot,.ttc.hi .ttc-dot{background:var(--red)}
    .ttc-body{flex:1;min-width:0}
    .ttc-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
    .ttc-meta{font-size:10px;color:var(--text3);margin-top:1px}
    .ttc-chip{font-size:9px;letter-spacing:.8px;text-transform:uppercase;padding:2px 6px;border-radius:2px;flex-shrink:0}
    .ttc-chip.ov{background:rgba(255,64,64,.1);color:var(--red)}
    .ttc-chip.td{background:rgba(200,255,0,.08);color:var(--accent)}
    .today-empty{padding:20px 0;text-align:center}
    .today-empty-glyph{font-family:'Instrument Serif',serif;font-size:32px;color:var(--text3);opacity:.3;margin-bottom:8px;font-style:italic}
    .today-empty-title{font-family:'Instrument Serif',serif;font-size:17px;color:var(--text2);letter-spacing:-.3px;margin-bottom:4px}
    .today-empty-sub{font-size:10px;color:var(--text3);letter-spacing:1px;line-height:1.9}

    /* ── CHAT PANE ── */
    #chat-pane{display:flex;flex-direction:column;flex:1;min-height:0}
    .divider-label{display:flex;align-items:center;gap:8px;padding:7px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
    .divider-label-line{flex:1;height:1px;background:var(--border)}
    .divider-label-text{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3)}
    #chat{flex:1;overflow-y:auto;padding:12px 16px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
    #chat::-webkit-scrollbar{width:2px}
    #chat::-webkit-scrollbar-thumb{background:var(--border2)}
    .msg{margin-bottom:14px;animation:fadeUp .2s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .msg-role{font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;color:var(--text3)}
    .msg.user .msg-role{color:var(--accent);opacity:.6}
    .msg-bubble{padding:9px 12px;border-radius:2px;line-height:1.7;white-space:pre-wrap;word-break:break-word;font-size:12px}
    .msg.user .msg-bubble{background:#161616;border-left:2px solid var(--accent)}
    .msg.ai .msg-bubble{background:#0e0e0e;border-left:2px solid var(--border2)}
    .msg.system .msg-bubble{background:transparent;border-left:none;color:var(--text3);font-size:11px;padding:4px 0}
    .action-card{margin-top:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:9px 11px;font-size:11px;color:var(--text2)}
    .action-card .action-title{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
    .typing{display:flex;gap:4px;padding:9px 12px;background:#0e0e0e;border-left:2px solid var(--border2);border-radius:2px;width:fit-content}
    .typing span{width:4px;height:4px;background:var(--text3);border-radius:50%;animation:blink 1.2s infinite}
    .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
    @keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
    #quick-prompts{padding:7px 16px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;border-top:1px solid var(--border)}
    #quick-prompts::-webkit-scrollbar{display:none}
    .quick-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-family:'DM Mono',monospace;font-size:10px;padding:5px 10px;border-radius:2px;cursor:pointer;white-space:nowrap;flex-shrink:0}
    .quick-btn:active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
    #input-bar{display:flex;align-items:flex-end;gap:9px;padding:9px 16px;padding-bottom:max(9px,env(safe-area-inset-bottom));border-top:1px solid var(--border);background:var(--bg);flex-shrink:0;position:relative;z-index:10}
    #msg-input{flex:1;background:var(--bg2);border:1px solid var(--border2);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:8px 12px;border-radius:4px;outline:none;resize:none;max-height:100px;min-height:36px;line-height:1.5}
    #msg-input::placeholder{color:var(--text3)}
    #send-btn{background:var(--accent);color:#000;border:none;width:36px;height:36px;border-radius:4px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    #send-btn:disabled{opacity:.3;cursor:default}
    #fitness-fab{width:36px;height:36px;background:var(--bg2);border:1px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}
    #fitness-fab:active{transform:scale(.93)}

    /* ── RIGHT PANEL ── */
    #panel{position:fixed;inset:0;background:var(--bg);z-index:50;transform:translateX(100%);transition:transform .25s ease;display:flex;flex-direction:column}
    #panel.open{transform:translateX(0)}
    .panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
    .panel-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
    .panel-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
    .panel-tabs::-webkit-scrollbar{display:none}
    .ptab{flex:1;min-width:60px;padding:10px 8px;text-align:center;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
    .ptab.active{color:var(--accent);border-bottom-color:var(--accent)}
    .panel-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .data-row{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer}
    .data-row-left{flex:1;min-width:0}
    .data-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .data-sub{font-size:11px;color:var(--text2);margin-top:2px}
    .data-val{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--accent);flex-shrink:0}
    .section-label{padding:12px 20px 6px;font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
    .metrics-row{display:grid;gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
    .metrics-row.col3{grid-template-columns:repeat(3,1fr)}.metrics-row.col2{grid-template-columns:repeat(2,1fr)}
    .metric-card{background:var(--bg);padding:16px 12px;text-align:center}
    .metric-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-1px}
    .metric-val.green{color:var(--green)}.metric-val.yellow{color:var(--accent)}.metric-val.red{color:var(--red)}.metric-val.blue{color:var(--blue)}.metric-val.purple{color:var(--purple)}
    .badge{font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:2px;display:inline-block}
    .badge.active{background:rgba(0,232,122,.1);color:var(--green)}.badge.invoiced{background:rgba(77,166,255,.1);color:var(--blue)}.badge.done{background:rgba(100,100,100,.1);color:var(--text3)}.badge.pending{background:rgba(200,255,0,.08);color:var(--accent)}.badge.card{background:rgba(185,124,255,.1);color:var(--purple)}
    .panel-add-btn{margin:16px 20px;padding:10px;background:var(--bg2);border:1px dashed var(--border2);color:var(--text3);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:2px;width:calc(100% - 40px);text-align:center}
    .panel-add-btn:active{border-color:var(--accent);color:var(--accent)}
    .form-field{margin-bottom:14px}
    .form-label{font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;display:block}
    .form-input,.form-select,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:10px 12px;border-radius:4px;outline:none;appearance:none}
    .form-textarea{resize:vertical;min-height:80px;line-height:1.5}
    .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
    .form-actions{display:flex;gap:10px;margin-top:20px;padding-bottom:32px}
    .btn-primary{flex:1;background:var(--accent);color:#000;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;padding:12px;border:none;border-radius:4px;cursor:pointer}
    .btn-secondary{background:var(--bg3);color:var(--text2);font-family:'Syne',sans-serif;font-weight:600;font-size:12px;letter-spacing:1px;padding:12px 16px;border:1px solid var(--border2);border-radius:4px;cursor:pointer}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:60;display:none;align-items:flex-end}
    .modal-overlay.open{display:flex}
    .modal{width:100%;background:var(--bg2);border-top:1px solid var(--border2);border-radius:12px 12px 0 0;padding:20px;max-height:85vh;overflow-y:auto}
    .modal-handle{width:36px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 20px}
    .modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:20px}
    .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-size:11px;padding:8px 16px;border-radius:2px;opacity:0;transition:all .2s;z-index:999;white-space:nowrap;pointer-events:none}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.ok{color:var(--green)}.toast.err{color:var(--red)}
    .empty{padding:32px 20px;text-align:center;color:var(--text3);font-size:11px}
    .loading{padding:40px 20px;text-align:center;color:var(--text3);font-size:11px}
    .spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .progress-wrap{height:3px;background:var(--border2);border-radius:2px;margin-top:8px}
    .progress-bar{height:100%;border-radius:2px;transition:width .4s ease}
    @keyframes blink-btn{0%,100%{opacity:1}50%{opacity:.2}}

    /* ── LEFT DRAWER ── */
    #drawer{position:fixed;inset:0;z-index:70;pointer-events:none}
    #drawer.open{pointer-events:all}
    #drawer-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .25s;pointer-events:none}
    #drawer.open #drawer-overlay{background:rgba(0,0,0,.7);pointer-events:all}
    #drawer-menu{position:absolute;top:0;left:0;bottom:0;width:260px;background:var(--bg2);border-right:1px solid var(--border);transform:translateX(-100%);transition:transform .25s ease;display:flex;flex-direction:column;padding-bottom:max(24px,env(safe-area-inset-bottom))}
    #drawer.open #drawer-menu{transform:translateX(0)}
    .drawer-top{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
    .drawer-wordmark{font-family:'Instrument Serif',serif;font-size:28px;letter-spacing:-1px;color:var(--text)}
    .drawer-wordmark span{color:var(--accent)}
    .drawer-sub{font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
    .drawer-nav{flex:1;padding:12px 0;overflow-y:auto}
    .drawer-section{font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;padding:12px 20px 6px}
    .drawer-item{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;transition:background .1s;border-left:2px solid transparent}
    .drawer-item:active{background:var(--bg3)}
    .drawer-item.active{border-left-color:var(--accent);background:var(--accent-dim)}
    .drawer-item.active .drawer-item-label{color:var(--accent)}
    .drawer-icon{width:20px;text-align:center;font-size:14px;flex-shrink:0}
    .drawer-item-label{font-size:13px;color:var(--text2);letter-spacing:.5px}
    .drawer-item-badge{margin-left:auto;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--red);background:rgba(255,64,64,.1);padding:2px 7px;border-radius:10px}
    .drawer-bottom{padding:16px 20px;border-top:1px solid var(--border)}
    .drawer-logout{display:flex;align-items:center;gap:10px;padding:10px 0;cursor:pointer;color:var(--text3);font-size:12px;letter-spacing:1px}
    .drawer-logout:hover{color:var(--red)}

    /* ── PROJECT PROGRESS (new) ── */
    .proj-card{margin:8px 12px 0;background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;animation:fadeUp .2s ease both}
    .proj-card-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
    .proj-card-header:active{background:var(--bg3)}
    .proj-card-left{flex:1;min-width:0}
    .proj-card-client{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .proj-card-name{font-size:10px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .proj-card-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
    .proj-prog-track{width:60px;height:3px;background:var(--border2);border-radius:2px;overflow:hidden}
    .proj-prog-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .5s ease}
    .proj-prog-fill.hi{background:var(--green)}
    .proj-pct{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;color:var(--text3)}
    .proj-meta-row{display:flex;align-items:center;gap:6px}
    .proj-chevron{font-size:10px;color:var(--text3);transition:transform .2s;flex-shrink:0}
    .proj-chevron.open{transform:rotate(90deg)}
    .proj-card-body{border-top:1px solid var(--border);background:var(--bg);overflow:hidden;max-height:0;transition:max-height .25s ease}
    .proj-card-body.open{max-height:400px}
    .proj-card-stats{display:flex;gap:0;border-bottom:1px solid var(--border)}
    .proj-stat{flex:1;padding:10px 12px;text-align:center;border-right:1px solid var(--border)}
    .proj-stat:last-child{border-right:none}
    .proj-stat-val{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:-1px}
    .proj-stat-lbl{font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
    .proj-task-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer}
    .proj-task-item:last-child{border-bottom:none}
    .proj-task-item:active{background:var(--bg3)}
    .proj-task-check{width:14px;height:14px;border:1px solid var(--border2);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
    .proj-task-check.done{background:var(--green);border-color:var(--green);color:#000}
    .proj-task-title{flex:1;font-size:12px;color:var(--text)}
    .proj-task-title.done{text-decoration:line-through;color:var(--text3)}
    .proj-task-due{font-size:10px;color:var(--text3);flex-shrink:0}
    .proj-no-tasks{padding:14px;font-size:11px;color:var(--text3);text-align:center}
    .proj-edit-btn{width:100%;padding:10px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);background:none;border:none;border-top:1px solid var(--border);cursor:pointer;text-align:center}
    .proj-edit-btn:active{color:var(--accent)}

    /* ── SIGNAL CARDS (new) ── */

<script>
/* ════════════════════════════════════════
   CONFIG
════════════════════════════════════════ */
const PASSWORD="almostcult";
const CLAUDE_ENDPOINT="https://api.adii.work/claude";
const WORKER_SECRET="almostcult";
const FIREBASE_KEY="AIzaSyDCbo5QmuGYoqfB3lWSbk4DRJiYqBQFU7k";
const FIRESTORE="https://firestore.googleapis.com/v1/projects/flow-2dfcf/databases/(default)/documents";

let chatHistory=JSON.parse(sessionStorage.getItem('flow-chat-history')||'[]');
let fsData={projects:[],tasks:[],finances:[],fitness:[],thoughts:[]};
let isThinking=false;
let currentPTab='tasks';
let signalSearchQuery='';
let signalActiveFilter='all';

/* ════════════════════════════════════════
   EVENT DELEGATION — FIX FOR MENU BUG
   All persistent UI buttons use delegated
   listeners on stable parent elements,
   never on elements that get re-rendered.
════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', ()=>{
  // Header buttons — delegated on header (never re-rendered)
  document.querySelector('header').addEventListener('click', e=>{
    const btn = e.target.closest('button,#wordmark-btn');
    if(!btn) return;
    if(btn.id==='clear-btn') clearChat();
    if(btn.id==='panel-btn') openPanel('tasks');
    if(btn.id==='wordmark-btn') openDrawer();
  });

  // Drawer — delegated on drawer-menu
  document.getElementById('drawer-menu').addEventListener('click', e=>{
    const item = e.target.closest('.drawer-item');
    const logout = e.target.closest('#logout-btn');
    if(logout){doLogout();return;}
    if(item){
      const sec = item.id.replace('dnav-','');
      drawerNav(sec);
    }
  });
  document.getElementById('drawer-overlay').addEventListener('click', closeDrawer);

  // Panel tabs — delegated on panel-tabs
  document.querySelector('.panel-tabs').addEventListener('click', e=>{
    const tab = e.target.closest('.ptab');
    if(tab) switchPTab(tab.dataset.tab);
  });
  document.getElementById('panel-close-btn').addEventListener('click', closePanel);

  // Input bar — delegated on input-bar
  document.getElementById('input-bar').addEventListener('click', e=>{
    if(e.target.id==='send-btn' || e.target.closest('#send-btn')) sendMsg();
    if(e.target.id==='fitness-fab' || e.target.closest('#fitness-fab')) openPanel('fitness');
  });

  // Modal close
  document.getElementById('modal-overlay').addEventListener('click', e=>{
    if(e.target===document.getElementById('modal-overlay')) closeModalForce();
  });

  // Auth enter key
  document.getElementById('pin').addEventListener('keydown', e=>{ if(e.key==='Enter') doAuth(); });

  // Auto-resize textarea + enter to send
  const input = document.getElementById('msg-input');
  input.addEventListener('input', ()=>{ input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,100)+'px'; });
  input.addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} });

  // Check auth
  if(localStorage.getItem('flow-ok')){
    document.getElementById('auth').style.display='none';
    document.getElementById('app').style.display='flex';
    boot();
  }
});

document.addEventListener('visibilitychange',()=>{
  if(!document.hidden&&localStorage.getItem('flow-ok')){ showRefreshSpinner(); loadAll().then(hideRefreshSpinner); }
});
let pullStartY=0;
document.addEventListener('touchstart',e=>{pullStartY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  if(e.changedTouches[0].clientY-pullStartY>90&&localStorage.getItem('flow-ok')){ showRefreshSpinner(); loadAll().then(hideRefreshSpinner); }
},{passive:true});

/* ════════════════════════════════════════
   AUTH
════════════════════════════════════════ */
function doAuth(){
  if(document.getElementById('pin').value===PASSWORD){
    localStorage.setItem('flow-ok','1');
    document.getElementById('auth').style.display='none';
    document.getElementById('app').style.display='flex';
    boot();

    document.getElementById('auth-err').style.display='block';
    document.getElementById('pin').value='';
  }
}
function doLogout(){ localStorage.removeItem('flow-ok'); sessionStorage.clear(); location.reload(); }

/* ════════════════════════════════════════
   BOOT
════════════════════════════════════════ */
async function boot(){
  document.getElementById('today-date-str').textContent=new Date().toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
  await loadAll();
  restoreChat();
}

async function loadAll(){
  try{
    const[p,t,f,fit,th]=await Promise.all([fsGet('projects'),fsGet('tasks'),fsGet('finances'),fsGet('fitness'),fsGet('thoughts')]);
    fsData={projects:p,tasks:t,finances:f,fitness:fit,thoughts:th};
    renderTaskBar();
    renderTodayTasks();
    if(currentPTab) renderPanelContent();
    updateDrawerBadges();
  } catch(e){ console.error(e); }
}

/* ════════════════════════════════════════
   TODAY PANE
════════════════════════════════════════ */
function renderTaskBar(){
  const today=new Date().toISOString().split('T')[0];
  const tomorrow=new Date(Date.now()+86400000).toISOString().split('T')[0];
  const ov=fsData.tasks.filter(t=>t.due&&t.due<today&&t.status!=='done').length;
  const td=fsData.tasks.filter(t=>t.due===today&&t.status!=='done').length;
  const up=fsData.tasks.filter(t=>t.due===tomorrow&&t.status!=='done').length;
  const dn=fsData.tasks.filter(t=>t.status==='done').length;
  document.getElementById('task-bar').innerHTML=`
    <div class="task-pill overdue" onclick="quickSend('Show overdue tasks')"><span class="pill-count">${ov}</span>overdue</div>
    <div class="task-pill today" onclick="quickSend('Tasks due today?')"><span class="pill-count">${td}</span>today</div>
    <div class="task-pill upcoming" onclick="quickSend('Tasks due tomorrow?')"><span class="pill-count">${up}</span>tomorrow</div>
    <div class="task-pill done"><span class="pill-count">${dn}</span>done</div>`;
}

function renderTodayTasks(){
  const today=new Date().toISOString().split('T')[0];
  const list=document.getElementById('today-tasks-list');
  const overdue=fsData.tasks.filter(t=>t.status!=='done'&&t.due&&t.due<today).sort((a,b)=>(a.due||'').localeCompare(b.due||''));
  const dueToday=fsData.tasks.filter(t=>t.status!=='done'&&t.due===today);
  const combined=[...overdue,...dueToday];
  if(!combined.length){
    list.innerHTML=`<div class="today-empty">
      <div class="today-empty-glyph">◌</div>
      <div class="today-empty-title">Clear horizon.</div>
      <div class="today-empty-sub">Nothing due today.<br>Add via panel or ask Flow.</div>
    </div>`;
    return;
  }
  list.innerHTML=combined.map((t,i)=>{
    const isOv=t.due&&t.due<today;
    const isHi=t.priority==='high';
    return`<div class="ttc${isOv?' ov':''}${isHi?' hi':''}" style="animation-delay:${i*0.04}s" onclick="openEditModal('task','${t.id}')">
      <div class="ttc-dot"></div>
      <div class="ttc-body">
        <div class="ttc-title">${escHtml(t.title||'—')}</div>
        <div class="ttc-meta">${[t.project?escHtml(t.project):'',t.due?formatDate(t.due):''].filter(Boolean).join(' · ')}</div>
      </div>
      <span class="ttc-chip ${isOv?'ov':'td'}">${isOv?'Overdue':'Today'}</span>
    </div>`;
  }).join('');
}

/* ════════════════════════════════════════
   FIRESTORE
════════════════════════════════════════ */
async function fsGet(col){
  const res=await fetch(`${FIRESTORE}/${col}?key=${FIREBASE_KEY}&pageSize=100`);
  const data=await res.json();
  if(!data.documents)return[];
  return data.documents.map(doc=>{
    const id=doc.name.split('/').pop();const fields={};
    for(const[k,v]of Object.entries(doc.fields||{})){
      if('stringValue'in v)fields[k]=v.stringValue;
      else if('integerValue'in v)fields[k]=Number(v.integerValue);
      else if('doubleValue'in v)fields[k]=Number(v.doubleValue);
      else if('booleanValue'in v)fields[k]=v.booleanValue;
      else fields[k]='';
    }
    return{id,...fields};
  });
}
async function fsWrite(col,id,fields){
  const fsFields={};
  for(const[k,v]of Object.entries(fields)){
    if(typeof v==='number'||(!isNaN(v)&&v!==''))fsFields[k]={integerValue:String(Math.round(Number(v)))};
    else fsFields[k]={stringValue:String(v)};
  }
  const mask=Object.keys(fields).map(k=>`updateMask.fieldPaths=${k}`).join('&');
  const url=id?`${FIRESTORE}/${col}/${id}?${mask}&key=${FIREBASE_KEY}`:`${FIRESTORE}/${col}?documentId=doc_${Date.now()}&key=${FIREBASE_KEY}`;
  const res=await fetch(url,{method:id?'PATCH':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields:fsFields})});
  return res.json();
}
async function fsDelete(col,id){await fetch(`${FIRESTORE}/${col}/${id}?key=${FIREBASE_KEY}`,{method:'DELETE'});}

/* ════════════════════════════════════════
   CLAUDE AI
════════════════════════════════════════ */
function buildSystemPrompt(){
  const today=new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const todayISO=new Date().toISOString().split('T')[0];
  return`You are Flow, personal AI agent for Aditya Rahul — freelance filmmaker under AlmostCult Labs, Delhi. Today is ${today}.

PROJECTS: ${JSON.stringify(fsData.projects)}
TASKS: ${JSON.stringify(fsData.tasks)}
FINANCES: ${JSON.stringify(fsData.finances)}
FITNESS (recent 7): ${JSON.stringify(fsData.fitness.slice(-7))}
SIGNAL (recent 10): ${JSON.stringify(fsData.thoughts.slice(-10))}

You can create/update/delete data via action blocks at END of response:
<action>{"op":"update","collection":"projects","id":"DOC_ID","fields":{"status":"invoice sent"}}</action>
<action>{"op":"create","collection":"tasks","fields":{"title":"Edit reel","priority":"high","due":"${todayISO}","status":"pending","project":"Kinuav"}}</action>
<action>{"op":"create","collection":"fitness","fields":{"date":"${todayISO}","weight":"75","calories":"1800","protein":"120","notes":""}}</action>
<action>{"op":"create","collection":"thoughts","fields":{"text":"idea","tags":"","linked_project":"","created":"${todayISO}","status":"raw"}}</action>
<action>{"op":"delete","collection":"tasks","id":"DOC_ID"}</action>

Be concise, direct. Indian currency (Rs). Dates as DD MMM. Synthesize don't repeat data. Sharp colleague tone.`;
}

async function sendToClaude(userMsg){
  chatHistory.push({role:'user',content:userMsg});
  const res=await fetch(CLAUDE_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json','x-secret':WORKER_SECRET},body:JSON.stringify({model:'claude-sonnet-4-5-20250929',max_tokens:1000,system:buildSystemPrompt(),messages:chatHistory})});
  const data=await res.json();
  if(data.error)throw new Error(data.error.message||JSON.stringify(data.error));
  const rawText=data.content?.[0]?.text||'Something went wrong.';
  const actionMatches=[...rawText.matchAll(/<action>([\s\S]*?)<\/action>/g)];
  const cleanText=rawText.replace(/<action>[\s\S]*?<\/action>/g,'').trim();
  chatHistory.push({role:'assistant',content:rawText});
  sessionStorage.setItem('flow-chat-history',JSON.stringify(chatHistory.slice(-20)));
  let actionsExecuted=[];
  for(const match of actionMatches){
    try{
      const cmd=JSON.parse(match[1].trim());
      if(cmd.op==='update'){await fsWrite(cmd.collection,cmd.id,cmd.fields);actionsExecuted.push(`Updated ${cmd.collection}/${cmd.id}`);}
      else if(cmd.op==='create'){await fsWrite(cmd.collection,null,cmd.fields);actionsExecuted.push(`Created in ${cmd.collection}`);}
      else if(cmd.op==='delete'){await fsDelete(cmd.collection,cmd.id);actionsExecuted.push(`Deleted ${cmd.collection}/${cmd.id}`);}
    }catch(e){actionsExecuted.push(`Action failed: ${e.message}`);}
  }
  if(actionsExecuted.length){await loadAll();renderPanelContent();}
  saveChatSession(userMsg,cleanText).catch(()=>{});
  return{text:cleanText,actions:actionsExecuted};
}

/* ════════════════════════════════════════
   CHAT UI
════════════════════════════════════════ */
function addMsg(role,text,actions=[],save=true){
  const chat=document.getElementById('chat');
  const div=document.createElement('div');div.className=`msg ${role}`;
  const roleLabel=role==='user'?'You':role==='ai'?'Flow':'';
  div.innerHTML=`${roleLabel?`<div class="msg-role">${roleLabel}</div>`:''}
    <div class="msg-bubble">${escHtml(text)}</div>
    ${actions.length?`<div class="action-card"><div class="action-title">Actions taken</div>${actions.map(a=>`<div>&#8594; ${escHtml(a)}</div>`).join('')}</div>`:''}`;
  chat.appendChild(div);chat.scrollTop=chat.scrollHeight;
  if(save){
    const saved=JSON.parse(sessionStorage.getItem('flow-chat-ui')||'[]');
    saved.push({role,text,actions});
    if(saved.length>50)saved.splice(0,saved.length-50);
    sessionStorage.setItem('flow-chat-ui',JSON.stringify(saved));
  }
}
function restoreChat(){
  const saved=JSON.parse(sessionStorage.getItem('flow-chat-ui')||'[]');
  if(saved.length>0)saved.forEach(m=>addMsg(m.role,m.text,m.actions||[],false));else greet();
}
function greet(){
  const hour=new Date().getHours();
  const g=hour<12?'Good morning':hour<17?'Good afternoon':'Good evening';
  const today=new Date().toISOString().split('T')[0];
  const summary=fsData.finances.find(f=>f.id==='summary')||{};
  const outstanding=summary.total_outstanding||0;
  const overdue=fsData.tasks.filter(t=>t.due&&t.due<today&&t.status!=='done').length;
  const dueToday=fsData.tasks.filter(t=>t.due===today&&t.status!=='done').length;
  const active=fsData.projects.filter(p=>p.status&&p.status.toLowerCase().includes('progress')).length;
  addMsg('ai',`${g}, Aditya.\n\n— ${active} active project${active!==1?'s':''}\n— ${overdue} overdue task${overdue!==1?'s':''}, ${dueToday} due today\n— Rs${outstanding.toLocaleString('en-IN')} outstanding\n\nWhat do you want to work on?`);
}
function showTyping(){
  const chat=document.getElementById('chat');
  const div=document.createElement('div');div.className='msg ai';div.id='typing-indicator';
  div.innerHTML=`<div class="msg-role">Flow</div><div class="typing"><span></span><span></span><span></span></div>`;
  chat.appendChild(div);chat.scrollTop=chat.scrollHeight;
}
function hideTyping(){document.getElementById('typing-indicator')?.remove();}
function escHtml(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function sendMsg(){
  if(isThinking)return;
  const input=document.getElementById('msg-input');
  const text=input.value.trim();if(!text)return;
  input.value='';input.style.height='auto';
  isThinking=true;
  // Only disable send btn — NOT other UI elements (critical bug fix)
  document.getElementById('send-btn').disabled=true;
  addMsg('user',text);showTyping();
  try{
    const{text:reply,actions}=await sendToClaude(text);
    hideTyping();addMsg('ai',reply,actions);
    if(actions.length)toast('Data updated','ok');
  }catch(e){
    hideTyping();addMsg('system','Failed to reach Claude. Check your connection.');
  }
  isThinking=false;
  document.getElementById('send-btn').disabled=false;
  input.focus();
}
function quickSend(text){document.getElementById('msg-input').value=text;sendMsg();}
function clearChat(){
  chatHistory=[];
  sessionStorage.removeItem('flow-chat-history');
  sessionStorage.removeItem('flow-chat-ui');
  document.getElementById('chat').innerHTML='';
  greet();
}

/* ════════════════════════════════════════
   PANEL / DRAWER NAVIGATION
════════════════════════════════════════ */
function openPanel(tab){
  // Show/hide special tabs
  ['signal','history'].forEach(t=>{
    const el=document.getElementById(`ptab-${t}`);
    if(el) el.style.display=(t===tab)?'':'none';
  });
  if(tab){
    currentPTab=tab;

   HELPERS
════════════════════════════════════════ */
function getBadge(status){
  if(!status)return'pending';
  const s=status.toLowerCase();
  if(s.includes('progress')||s==='active')return'active';
  if(s.includes('invoice'))return'invoiced';
  if(s==='done'||s==='completed')return'done';
  return'pending';
}
function formatDate(dateStr){
  try{return new Date(dateStr).toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});}catch{return dateStr;}
}

  'math':        {bg:'rgba(200,255,0,.12)',  color:'var(--accent)',border:'rgba(200,255,0,.25)'},
  'kinuav':      {bg:'rgba(0,232,122,.1)',   color:'var(--green)',border:'rgba(0,232,122,.2)'},
  'reel':        {bg:'rgba(0,232,122,.1)',   color:'var(--green)',border:'rgba(0,232,122,.2)'},
  'edit':        {bg:'rgba(0,232,122,.1)',   color:'var(--green)',border:'rgba(0,232,122,.2)'},
};
const DEFAULT_TAG_STYLE={bg:'rgba(100,100,100,.12)',color:'#777',border:'rgba(100,100,100,.2)'};

function tagStyle(tag){
  const t=tag.toLowerCase().trim();
  return TAG_COLORS[t]||DEFAULT_TAG_STYLE;
}

function extractSignalTitle(text){
  if(!text)return'Untitled';
  const lines=text.trim().split('\n');
  const first=lines[0].trim();
  // Remove markdown-style prefix
  const clean=first.replace(/^#+\s*/,'').replace(/^\*+\s*/,'').replace(/^-\s*/,'');
  return clean.length>80?clean.substring(0,80)+'…':clean;
}

function extractSignalBody(text){
  if(!text)return'';
  const lines=text.trim().split('\n');
  if(lines.length<=1)return'';
  return lines.slice(1).join('\n').trim();
}

function signalMatchesFilter(thought){
  if(signalActiveFilter==='all')return true;
  const tags=(thought.tags||'').toLowerCase().split(',').map(t=>t.trim());
  return tags.includes(signalActiveFilter);
}

function signalMatchesSearch(thought){
  if(!signalSearchQuery)return true;
  const q=signalSearchQuery.toLowerCase();
  const text=(thought.text||'').toLowerCase();
  const tags=(thought.tags||'').toLowerCase();
  const proj=(thought.linked_project||'').toLowerCase();
  return text.includes(q)||tags.includes(q)||proj.includes(q);
}

function getUniqueSignalTags(){
  const tagSet=new Set();
  fsData.thoughts.forEach(t=>{
    (t.tags||'').split(',').forEach(tag=>{
      const clean=tag.trim().toLowerCase();
      if(clean) tagSet.add(clean);
    });
  });
  return [...tagSet];
}

/* ════════════════════════════════════════
   PROJECT PROGRESS HELPERS
════════════════════════════════════════ */
function getProjectTasks(project){
  const clientKey=(project.client||'').toLowerCase();
  const nameKey=(project.project||'').toLowerCase();
  return fsData.tasks.filter(t=>{
    const tp=(t.project||'').toLowerCase();
    return tp===clientKey||tp===nameKey||tp.includes(clientKey)||clientKey.includes(tp)||tp.includes(nameKey)||nameKey.includes(tp);
  });
}

function calcProgress(project){
  const tasks=getProjectTasks(project);
  if(!tasks.length)return{pct:0,done:0,total:0,tasks};
  const done=tasks.filter(t=>t.status==='done').length;
  return{pct:Math.round(done/tasks.length*100),done,total:tasks.length,tasks};
}

    body.appendChild(addBtn);

    // Cards
    const cards=document.createElement('div');
    cards.className='signal-cards';

    if(!raw.length&&!actioned.length){
      cards.innerHTML='<div class="empty">No signals yet.<br>Dump ideas via chat or the + button.</div>';
    } else {
      if(raw.length){
        const rawLabel=document.createElement('div');
        rawLabel.className='section-label';
        rawLabel.textContent=`Raw · ${raw.length}`;
        cards.appendChild(rawLabel);
        raw.forEach((t,i)=>{ cards.innerHTML+=buildCard(t,i); });
      }
      if(actioned.length){
        cards.innerHTML+=`<div class="section-label" style="margin-top:8px">Actioned · ${actioned.length}</div>`;
        actioned.forEach((t,i)=>{ cards.innerHTML+=buildCard(t,i); });
      }
    }
    body.appendChild(cards);

    // Restore focus on search
    requestAnimationFrame(()=>{
      const inp=document.getElementById('signal-search-input');
      if(inp&&signalSearchQuery) inp.setSelectionRange(inp.value.length,inp.value.length);
    });

  /* ── HISTORY TAB ── */
  }else if(currentPTab==='history'){
    body.innerHTML=`<div class="loading"><div class="spinner"></div>Loading...</div>`;
    loadChatHistory().then(sessions=>{
      if(!sessions.length){body.innerHTML='<div class="empty">No chat history yet</div>';return;}
      body.innerHTML=`<div style="padding:12px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)">
          <span style="font-size:10px;color:var(--text3);letter-spacing:1px">${sessions.length} sessions</span>
          <button onclick="summariseHistory()" style="background:none;border:1px solid var(--border2);color:var(--text2);font-family:'DM Mono',monospace;font-size:10px;padding:5px 10px;border-radius:2px;cursor:pointer;letter-spacing:1px">SUMMARISE</button>
        </div>
        ${sessions.map(s=>`<div class="data-row" style="flex-direction:column;align-items:flex-start;gap:6px" onclick="expandSession('${s.id}')">
          <div style="display:flex;justify-content:space-between;width:100%">
            <div class="data-name" style="font-size:12px">${escHtml(s.date)}</div>
            <span style="font-size:10px;color:var(--text3)">${s.count} msgs</span>
          </div>
          <div id="session-${s.id}" style="display:none;width:100%"></div>
        </div>`).join('')}`;
    });
  }
}

function toggleProjCard(bodyId,chevId){
  const b=document.getElementById(bodyId);
  const c=document.getElementById(chevId);
  if(!b)return;
  const isOpen=b.classList.contains('open');
  b.classList.toggle('open',!isOpen);
  if(c)c.classList.toggle('open',!isOpen);
}

function toggleSigCard(bodyId,btn){
  const el=document.getElementById(bodyId);if(!el)return;
  const isCollapsed=el.classList.contains('collapsed');
  el.classList.toggle('collapsed',!isCollapsed);
  btn.textContent=isCollapsed?'collapse ‹':'expand ›';
}

}

async function saveNew(type){
  let fields={},col='';const today=new Date().toISOString().split('T')[0];
  if(type==='task'){col='tasks';fields={title:getVal('f-title'),project:getVal('f-project'),priority:getVal('f-priority'),due:getVal('f-due'),status:'pending'};}
  else if(type==='project'){col='projects';fields={client:getVal('f-client'),project:getVal('f-pname'),status:getVal('f-status'),total:getVal('f-total')||0,pending:getVal('f-pending')||0,notes:getVal('f-notes'),invoice:''};}
  else if(type==='fitness'){col='fitness';fields={date:getVal('f-date')||today,weight:getVal('f-weight'),calories:getVal('f-calories'),protein:getVal('f-protein'),notes:getVal('f-fnotes')};}
  else if(type==='signal'){col='thoughts';fields={text:getVal('f-text'),tags:getVal('f-tags'),linked_project:getVal('f-linked'),created:today,status:'raw'};}
  await fsWrite(col,null,fields);closeModalForce();await loadAll();renderPanelContent();toast('Saved','ok');
}
async function saveEdit(type,id){
  let fields={},col='';
  if(type==='task'){col='tasks';fields={title:getVal('f-title'),project:getVal('f-project'),priority:getVal('f-priority'),due:getVal('f-due'),status:getVal('f-status')};}
  else if(type==='project'){col='projects';fields={client:getVal('f-client'),project:getVal('f-pname'),status:getVal('f-status'),total:getVal('f-total')||0,pending:getVal('f-pending')||0,invoice:getVal('f-invoice'),notes:getVal('f-notes')};}
  else if(type==='fitness'){col='fitness';fields={date:getVal('f-date'),weight:getVal('f-weight'),calories:getVal('f-calories'),protein:getVal('f-protein'),notes:getVal('f-fnotes')};}
  else if(type==='signal'){col='thoughts';fields={text:getVal('f-text'),tags:getVal('f-tags'),linked_project:getVal('f-linked'),status:getVal('f-sigstatus')};}
  await fsWrite(col,id,fields);closeModalForce();await loadAll();renderPanelContent();toast('Updated','ok');
}
async function deleteItem(col,id){await fsDelete(col,id);closeModalForce();await loadAll();renderPanelContent();toast('Deleted','ok');}

/* ════════════════════════════════════════
   CHAT HISTORY
════════════════════════════════════════ */
async function saveChatSession(userMsg,aiReply){
  const now=new Date();
  await fsWrite('chat_history',null,{date:now.toISOString().split('T')[0],user:userMsg,ai:aiReply.substring(0,500),timestamp:now.toISOString()});
}
async function loadChatHistory(){
  try{
    const docs=await fsGet('chat_history');const grouped={};
    docs.sort((a,b)=>(b.timestamp||'').localeCompare(a.timestamp||'')).forEach(d=>{
      const date=d.date||'Unknown';
      if(!grouped[date])grouped[date]={id:date,date:formatDate(date),count:0,msgs:[]};
      grouped[date].count++;grouped[date].msgs.push(d);
    });
    return Object.values(grouped);
  }catch(e){return[];}
}
function expandSession(dateId){
  const el=document.getElementById(`session-${dateId}`);if(!el)return;
  if(el.style.display==='none'){
    el.style.display='block';
    loadChatHistory().then(sessions=>{
      const s=sessions.find(x=>x.id===dateId);if(!s)return;
      el.innerHTML=s.msgs.map(m=>`<div style="margin-bottom:8px;padding:8px;background:var(--bg3);border-radius:2px">
        <div style="font-size:9px;color:var(--accent);letter-spacing:1px;margin-bottom:3px">YOU</div>
        <div style="font-size:11px;color:var(--text2)">${escHtml(m.user||'')}</div>
        <div style="font-size:9px;color:var(--text3);letter-spacing:1px;margin:5px 0 3px">FLOW</div>
        <div style="font-size:11px;color:var(--text2)">${escHtml((m.ai||'').substring(0,300))}${(m.ai||'').length>300?'...':''}</div>
      </div>`).join('');
    });
  }else{el.style.display='none';}
}
async function summariseHistory(){
  closePanel();
  const sessions=await loadChatHistory();
  const allMsgs=sessions.flatMap(s=>s.msgs).slice(-30);
  const prompt='Summarise our recent conversations - what did we work on, decisions made, still open?\n\n'+allMsgs.map(m=>'Me: '+m.user+'\nFlow: '+m.ai).join('\n\n');
  document.getElementById('msg-input').value=prompt;sendMsg();
}

function toast(msg,type=''){
  const el=document.getElementById('toast');el.textContent=msg;
  el.className=`toast ${type} show`;setTimeout(()=>el.classList.remove('show'),2500);
}
